<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>test</title>
<style>
  html,body{margin:0;height:100%}
  body{display:flex;align-items:center;justify-content:center;background:#fff;font-family:ui-monospace,monospace}
  .row{display:flex;align-items:center;gap:70px}
  .wrap{position:relative}
  .rect{position:relative;width:150px;height:500px;background:#fff;border:1px solid #333;box-sizing:border-box;overflow:hidden}
  .rect img{position:absolute;left:50%;top:50%;height:80px;width:auto;mix-blend-mode:multiply;z-index:2}
  .mark{position:absolute;height:0;width:20px;border-top:2px solid #e2e5ea;z-index:0}
  .mark.major{width:28px;border-top-width:2px;border-top-color:#9aa1a9}
  .mark.left{left:0}
  .mark.right{right:0}
  .set{position:absolute;display:flex;flex-direction:row;gap:6px;z-index:5}
  .setA{left:50%;transform:translateX(-50%);bottom:100%;margin-bottom:8px}
  .setB{left:50%;transform:translateX(-50%);top:100%;margin-top:8px}
  .setR{left:100%;top:50%;transform:translateY(-50%);margin-left:8px;flex-direction:column}
  .setL{right:100%;top:50%;transform:translateY(-50%);margin-right:8px;flex-direction:column}
  .set button{width:32px;height:32px;font-size:13px;border:1px solid #cfd4da;border-radius:8px;background:#f1f3f5;cursor:pointer;padding:0}
  .set button:hover{background:#e7eaee}
</style>
</head>
<body>
  <div class="row" id="row"></div>
<script src="data.js"></script>
<script>
  function el(tag,cls){var e=document.createElement(tag);if(cls)e.className=cls;return e;}
  function btn(sym){var b=el('button');b.innerHTML=sym;return b;}
  function carImg(){var i=el('img');i.src='topview.png';i.alt='car';return i;}
  function load(key,def){try{var v=localStorage.getItem(key);return v===null?def:parseFloat(v);}catch(e){return def;}}
  function save(key,val){try{localStorage.setItem(key,val);}catch(e){}}
  var sharedO1=null, sharedO2=null, sharedRuler=null;
  // fixed scale: the full 500px rectangle spans fullSec seconds (default 4s), controlled only
  // by rect #1's left-hand buttons (setL); every rect's ruler redraws on change.
  // ruler: small line every 0.2s, large line every 1.0s.
  // reference geometry: the top car's BACK bumper is the 0s datum, sitting TOP_MARGIN_SEC below
  // the top of the ruler; the bottom car's FRONT bumper sits `gap` seconds below that datum.
  // with a 4s ruler + 0.5s margins, rect #1's demo gap of 3s puts the front bumper 0.5s from the
  // bottom; a gap > 3.5s pushes the bottom car off the bottom edge (clipped, not visible).
  var RECT_H=500, FULL_SEC_DEFAULT=4.0, MINOR_SEC=0.2, MAJOR_EVERY=5, SCALE_STEP_SEC=0.2, MIN_FULL_SEC=1.0;
  var TOP_MARGIN_SEC=0.5, DEMO_GAP_SEC=3.0, CAR_HALF_PX=84;
  var fullSec=load('test_scale_v3',FULL_SEC_DEFAULT), pxPerSec, pitch;
  function recomputeScale(){pxPerSec=RECT_H/fullSec; pitch=MINOR_SEC*pxPerSec;}
  recomputeScale();
  var RULER_DEFAULT_PX=0; // ruler ticks start clean at the top of the rectangle (0,1,2,3,4s)
  // convert a bumper position (seconds below top of ruler) into the img-center translateY offset o.
  // a car image (rotated) is 2*halfH tall; front bumper = top edge (center-halfH), back = bottom edge (center+halfH).
  function offsetForFrontBumper(S,halfH){return S*pxPerSec + halfH - RECT_H/2;}
  function offsetForBackBumper(S,halfH){return S*pxPerSec - halfH - RECT_H/2;}
  var allRedraws=[], rect1Followers=[];
  function broadcastScaleChange(){recomputeScale(); allRedraws.forEach(function(fn){fn();}); save('test_scale_v3',fullSec);}
  function broadcastRect1Change(){rect1Followers.forEach(function(fn){fn();});}
  function buildSetup(k){
    var wrap=el('div','wrap'), rect=el('div','rect');
    var c1=carImg(), c2=carImg();
    rect.appendChild(c1); rect.appendChild(c2);
    var setA=el('div','set setA'), setB=el('div','set setB'), setR=el('div','set setR');
    var up1=btn('&#9650;'),dn1=btn('&#9660;'),up2=btn('&#9650;'),dn2=btn('&#9660;'),upR=btn('&#9650;'),dnR=btn('&#9660;');
    setA.appendChild(up1); setA.appendChild(dn1);
    setB.appendChild(up2); setB.appendChild(dn2);
    setR.appendChild(upR); setR.appendChild(dnR);
    wrap.appendChild(rect); wrap.appendChild(setA); wrap.appendChild(setB); wrap.appendChild(setR);
    if(k===0){
      var setL=el('div','set setL'), upS=btn('&#9650;'), dnS=btn('&#9660;');
      setL.appendChild(upS); setL.appendChild(dnS);
      wrap.appendChild(setL);
      upS.onclick=function(){fullSec+=SCALE_STEP_SEC;broadcastScaleChange();};
      dnS.onclick=function(){fullSec=Math.max(MIN_FULL_SEC,fullSec-SCALE_STEP_SEC);broadcastScaleChange();};
    }
    var key1='test_car_v3_'+k+'_1', key2='test_car_v3_'+k+'_2', keyR='test_ruler_v3_'+k;
    // defaults: top car back bumper at the datum (0.5s from top), bottom car front bumper 3s below it
    var o1def=offsetForBackBumper(TOP_MARGIN_SEC,CAR_HALF_PX), o2def=offsetForFrontBumper(TOP_MARGIN_SEC+DEMO_GAP_SEC,CAR_HALF_PX);
    var o1, o2, rulerOffset;
    if(k===0){o1=load(key1,o1def); o2=load(key2,o2def); rulerOffset=load(keyR,RULER_DEFAULT_PX); sharedO1=o1; sharedO2=o2; sharedRuler=rulerOffset;}
    else{o1=load(key1,sharedO1); o2=load(key2,sharedO2); rulerOffset=load(keyR,sharedRuler);}
    function ap(e,o){e.style.transform='translate(-50%,-50%) translateY('+o+'px) rotate(-90deg)';}
    function redrawMarks(){
      var old=rect.querySelectorAll('.mark');
      for(var j=old.length-1;j>=0;j--) rect.removeChild(old[j]);
      var iStart=Math.ceil(-rulerOffset/pitch), iEnd=Math.floor((RECT_H-rulerOffset)/pitch);
      for(var i=iStart;i<=iEnd;i++){
        var major=(i%MAJOR_EVERY===0), y=i*pitch+rulerOffset;
        ['left','right'].forEach(function(side){var d=el('div','mark '+side+(major?' major':''));d.style.top=y.toFixed(1)+'px';rect.appendChild(d);});
      }
    }
    allRedraws.push(redrawMarks);
    function moveCars(){ap(c1,o1);ap(c2,o2);}
    function recalc(){moveCars();redrawMarks();}
    up1.onclick=function(){o1-=pitch;moveCars();save(key1,o1);if(k===0){sharedO1=o1;broadcastRect1Change();}};
    dn1.onclick=function(){o1+=pitch;moveCars();save(key1,o1);if(k===0){sharedO1=o1;broadcastRect1Change();}};
    up2.onclick=function(){o2-=pitch;moveCars();save(key2,o2);}; dn2.onclick=function(){o2+=pitch;moveCars();save(key2,o2);};
    upR.onclick=function(){rulerOffset-=pitch/2;redrawMarks();save(keyR,rulerOffset);if(k===0){sharedRuler=rulerOffset;broadcastRect1Change();}};
    dnR.onclick=function(){rulerOffset+=pitch/2;redrawMarks();save(keyR,rulerOffset);if(k===0){sharedRuler=rulerOffset;broadcastRect1Change();}};
    moveCars(); redrawMarks();
    c1.addEventListener('load',recalc); if(c1.complete)recalc();
    return wrap;
  }
  var row=document.getElementById('row');
  for(var k=0;k<3;k++) row.appendChild(buildSetup(k));

  // --- rect #4: live animation driven by real sector times from data.js (DB) ---
  var SELF_CAR='666';
  var LEG={}, BX={}, BKEYS={};
  var animCls=Object.keys(DB.classes).filter(function(c){return DB.classes[c].indexOf(SELF_CAR)>=0;})[0];
  DB.cars=DB.classes[animCls];
  DB.cars.forEach(function(st){
    LEG[st]=(DB.legs[st]||[]).slice().sort(function(a,b){return a[2]-b[2];});
    var m={}; (DB.legs[st]||[]).forEach(function(g){m[(g[0]-1)*5+g[1]]=g[3];});
    BX[st]=m; BKEYS[st]=Object.keys(m).map(Number).sort(function(a,b){return a-b;});
  });
  function progress(lg,T){return lg[0]*5+(lg[1]-1)+(T-lg[2])/((lg[3]-lg[2])||1);}
  function activeLeg(st,T){var a=LEG[st],lo=0,hi=a.length-1,res=-1;while(lo<=hi){var m=(lo+hi)>>1;if(a[m][2]<=T){res=m;lo=m+1;}else hi=m-1;}if(res<0)return null;var g=a[res];return(T<g[3])?g:null;}
  function livePos(T){var a=[];DB.cars.forEach(function(st){var lg=activeLeg(st,T);if(lg)a.push([progress(lg,T),st]);});a.sort(function(x,y){return y[0]-x[0];});var m={};a.forEach(function(e,i){m[e[1]]=i+1;});return m;}
  function commonGap(ref,other,T){var ks=BKEYS[ref];for(var i=ks.length-1;i>=0;i--){var bi=ks[i],tr=BX[ref][bi];if(tr>T)continue;var to=BX[other][bi];if(to!=null&&to<=T)return tr-to;}return null;}
  function aheadGapAt(T){
    var lp=livePos(T), p=lp[SELF_CAR];
    if(!p) return {ah:null,gap:null};
    var byPos={}; for(var st in lp) byPos[lp[st]]=st;
    var ah=byPos[p-1];
    if(!ah) return {ah:null,gap:null};
    var g=commonGap(SELF_CAR,ah,T);
    return {ah:ah, gap:(g!=null?Math.max(0,g):null)};
  }

  function buildAnimated(){
    var wrap=el('div','wrap'), rect=el('div','rect');
    var c1=carImg(), c2=carImg(); // c1 = ahead car (fixed, mirrors rect #1's top car), c2 = SELF_CAR (moves with the real gap)
    rect.appendChild(c1); rect.appendChild(c2);
    var label=el('div'); label.style.cssText='position:absolute;left:100%;top:0;margin-left:8px;font-size:11px;line-height:1.5;color:#6b7480;white-space:pre;font-family:ui-monospace,monospace';
    wrap.appendChild(rect); wrap.appendChild(label);

    var halfH=84, lastGap=0, lastAh=null;

    function ap(e,o){e.style.transform='translate(-50%,-50%) translateY('+o+'px) rotate(-90deg)';}
    // ruler and top-car position always mirror rect #1 live (no independent state here)
    function redrawMarks(){
      var old=rect.querySelectorAll('.mark');
      for(var j=old.length-1;j>=0;j--) rect.removeChild(old[j]);
      var iStart=Math.ceil(-sharedRuler/pitch), iEnd=Math.floor((RECT_H-sharedRuler)/pitch);
      for(var i=iStart;i<=iEnd;i++){
        var major=(i%MAJOR_EVERY===0), y=i*pitch+sharedRuler;
        ['left','right'].forEach(function(side){var d=el('div','mark '+side+(major?' major':''));d.style.top=y.toFixed(1)+'px';rect.appendChild(d);});
      }
    }
    allRedraws.push(function(){positionCars();redrawMarks();});
    rect1Followers.push(function(){positionCars();redrawMarks();});

    // top car fixed (mirrors rect #1); its BACK bumper is the 0s datum. c2 (SELF_CAR) is placed so its
    // FRONT bumper sits lastGap seconds below that datum. gap > (fullSec - datum) pushes it off the bottom (clipped).
    function positionCars(){
      var datumSec=RECT_H/2/pxPerSec+sharedO1/pxPerSec+halfH/pxPerSec; // top car back bumper, in seconds from top of ruler
      var o2=offsetForFrontBumper(datumSec+lastGap,halfH);
      ap(c1,sharedO1); ap(c2,o2);
    }
    function recalc(){var hh=c1.getBoundingClientRect().height;if(hh>10)halfH=hh/2;positionCars();redrawMarks();}

    var selfKeys=BKEYS[SELF_CAR], stepIdx=0;
    function stepAnim(){
      if(!selfKeys.length)return;
      var bkey=selfKeys[stepIdx], T=BX[SELF_CAR][bkey], res=aheadGapAt(T);
      if(res.gap!=null){lastGap=res.gap; lastAh=res.ah;}
      positionCars();
      var lap=Math.floor((bkey-1)/5)+1, seg=((bkey-1)%5)+1;
      label.textContent='#'+SELF_CAR+'\nL'+lap+' S'+seg+'\nahead #'+(lastAh||'-')+'\nΔ'+lastGap.toFixed(1)+'s';
      stepIdx=(stepIdx+1)%selfKeys.length;
    }
    recalc(); stepAnim();
    c1.addEventListener('load',recalc); if(c1.complete)recalc();
    setInterval(stepAnim,900);
    return wrap;
  }
  row.appendChild(buildAnimated());
</script>
</body>
</html>
