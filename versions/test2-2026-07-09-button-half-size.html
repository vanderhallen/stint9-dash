<style>

  .item[data-nav]{cursor:pointer}

  #xferBtn:hover{background:#6b7480}
  #xferBtn.busy{opacity:.35;pointer-events:none}
  /* iPhone-style unread badge on the STINT button: how many sets are in STINT */
  #stintBadge{position:absolute;top:-9px;right:-9px;min-width:24px;height:24px;padding:0 6px;box-sizing:border-box;border-radius:12px;
    background:#e0301e;color:#fff;font-family:inherit;font-size:13px;font-weight:700;display:none;align-items:center;justify-content:center;

  .pset.stint .psetlbl{background:#e7ecf5}.pset.stock .psetlbl{background:#e9f2ea}
  .pband{display:grid;grid-template-columns:repeat(5,40px);grid-template-rows:repeat(3,44px);border:2px solid #16202b;border-radius:9px;overflow:hidden;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.08)}
  /* empty parking spot: keep the rectangle, no icons — a band drops in here
     after a set is moved to PIT during a pitstop */
  .pband.placeholder{display:block;width:200px;height:132px;background:#f7f8fa;box-shadow:none}
  .pcell{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px}

  .pcell .pid{font-size:13px;font-weight:700;color:#16202b}
  .pcell .pn{font-size:14px;font-weight:700;color:#16202b}

<body>
<div id="reelh">
  <div class="hpanel" id="stintPanel"></div>
  <div class="hpanel" id="boardPanel"><div id="stage" style="position:relative;width:100%;height:100%"></div></div>

<script>
function el(tag,cls){const e=document.createElement(tag);if(cls)e.className=cls;return e;}
const stage=document.getElementById('stage');

/* ---- scale/rotation persistence across refresh ---- */
function loadState(key){try{return JSON.parse(localStorage.getItem('test2_v1_'+key));}catch(e){return null;}}
function saveState(key,x,y,scale,rot){try{localStorage.setItem('test2_v1_'+key,JSON.stringify({x,y,scale,rot}));}catch(e){}}

/* one-time reset: this version bakes the final layout into the code below,
   so wipe any saved positions/flags from the earlier drag-era experiments
   and let the code define everything. Runs once (guarded by a version key). */
try{
  if(localStorage.getItem('test2_layout_v2')!=='1'){
    Object.keys(localStorage).filter(k=>k.indexOf('test2_')===0).forEach(k=>localStorage.removeItem(k));
    localStorage.setItem('test2_layout_v2','1');
  }
}catch(e){}
/* the car briefly had double-click-to-rotate; wipe any stale saved rotation so
   the car always uses its code orientation (nose-up). It's not interactive now,
   so nothing re-saves it. */
try{localStorage.removeItem('test2_v1_car-img');localStorage.removeItem('test2_v1_topview-ref');}catch(e){}

function makeItem(x,y,innerHTML,extraCls,key,initialRot){
  const saved=key?loadState(key):null;
  const d=el('div','item'+(extraCls?(' '+extraCls):''));
  const sx=saved?saved.x:x, sy=saved?saved.y:y, sscale=saved&&saved.scale?saved.scale:1;
  const srot=saved&&saved.rot!=null?saved.rot:(initialRot||0);
  d.style.left=sx+'px';d.style.top=sy+'px';
  d.dataset.scale=sscale;
  if(sscale!==1)d.style.transform='scale('+sscale+')';
  if(key)d.dataset.key=key;
  d.innerHTML=innerHTML;
  const graphic=d.querySelector('svg,img');
  d.dataset.rot=srot;
  if(graphic&&srot)graphic.style.transform='rotate('+srot+'deg)';
  stage.appendChild(d);
  return d;
}

/* ---- icons (inline SVG, styled to match the reference set) ---- */
const ICONS={
  hot:`<svg width="64" height="64" viewBox="0 0 64 64">
    <g stroke="#e0301e" stroke-width="3" fill="none" stroke-linecap="round">
      <line x1="4" y1="18" x2="16" y2="18"/><line x1="4" y1="26" x2="16" y2="26"/><line x1="4" y1="34" x2="14" y2="34"/>
      <path d="M28 10 v26 a8 8 0 1 0 8 0 V10 a4 4 0 0 0 -8 0 Z"/>

    </g>
    <path d="M46 24 C40 32 42 38 47 40 C44 34 48 32 48 28 C52 32 52 40 46 46 C56 44 58 30 46 24 Z" fill="#f3a6a0" opacity=".85"/>
  </svg>`,
  cold:`<svg width="64" height="64" viewBox="0 0 64 64">
    <g stroke="#2f5fd0" stroke-width="3" fill="none" stroke-linecap="round">
      <line x1="4" y1="18" x2="16" y2="18"/><line x1="4" y1="26" x2="16" y2="26"/><line x1="4" y1="34" x2="14" y2="34"/>
      <path d="M28 10 v26 a8 8 0 1 0 8 0 V10 a4 4 0 0 0 -8 0 Z"/>
      <circle cx="32" cy="46" r="4" fill="#2f5fd0"/>
    </g>
    <g stroke="#2f5fd0" stroke-width="2.5" stroke-linecap="round">
      <line x1="46" y1="18" x2="46" y2="38"/><line x1="38" y1="28" x2="54" y2="28"/>
      <line x1="40" y1="21" x2="52" y2="35"/><line x1="52" y1="21" x2="40" y2="35"/>
    </g>
  </svg>`,
  new:`<svg width="64" height="64" viewBox="0 0 64 64">
    <path fill="none" stroke="#16202b" stroke-width="3" stroke-linejoin="round"
      d="M32 3 L37 11 L46 6 L46 16 L56 17 L51 26 L59 32 L51 38 L56 47 L46 48 L46 58 L37 53 L32 61 L27 53 L18 58 L18 48 L8 47 L13 38 L5 32 L13 26 L8 17 L18 16 L18 6 L27 11 Z"/>
    <text x="32" y="37" text-anchor="middle" font-family="IBM Plex Mono,monospace" font-weight="700" font-size="13" fill="#16202b">NEW</text>
  </svg>`,
  used:`<svg width="64" height="64" viewBox="0 0 64 64">
    <g fill="#16202b">
      <path d="M8 22 h34 v-8 l16 12 -16 12 v-8 h-34 z"/>
      <path d="M56 42 h-34 v8 l-16 -12 16 -12 v8 h34 z"/>
    </g>
  </svg>`,
  km:`<svg width="64" height="64" viewBox="0 0 64 64">
    <g fill="#16202b">
      <path d="M14 6 a9 9 0 0 1 9 9 c0 7 -9 17 -9 17 s-9 -10 -9 -17 a9 9 0 0 1 9 -9 z"/>
      <circle cx="14" cy="15" r="4" fill="#fff"/>
      <path d="M50 6 a9 9 0 0 1 9 9 c0 7 -9 17 -9 17 s-9 -10 -9 -17 a9 9 0 0 1 9 -9 z"/>
      <circle cx="50" cy="15" r="4" fill="#fff"/>
    </g>
    <line x1="6" y1="50" x2="58" y2="50" stroke="#16202b" stroke-width="3"/>
    <text x="32" y="46" text-anchor="middle" font-family="IBM Plex Mono,monospace" font-weight="700" font-size="14" fill="#16202b">KM</text>
  </svg>`,
  cycle:`<svg width="64" height="64" viewBox="0 0 64 64">
    <g stroke="#e0301e" stroke-width="3" fill="none" stroke-linecap="round">
      <path d="M12 22 a20 20 0 0 1 34 -8"/>
      <polygon points="46,6 46,16 56,11" fill="#e0301e" stroke="none"/>
      <path d="M52 42 a20 20 0 0 1 -34 8"/>
      <polygon points="18,58 18,48 8,53" fill="#e0301e" stroke="none"/>
      <path d="M24 26 q4 -6 8 0 q4 6 8 0" stroke-width="2.5"/>
    </g>
  </svg>`,
  wet:`<svg width="64" height="64" viewBox="0 0 64 64">
    <circle cx="32" cy="32" r="28" fill="none" stroke="#16202b" stroke-width="3"/>
    <path d="M20 26 a8 8 0 0 1 6 -13 a10 10 0 0 1 19 3 a7 7 0 0 1 -2 14 h-21 a6 6 0 0 1 -2 -4 z" fill="#16202b"/>
    <g stroke="#16202b" stroke-width="2.5" stroke-linecap="round">
      <line x1="22" y1="38" x2="19" y2="46"/><line x1="32" y1="38" x2="29" y2="46"/><line x1="42" y1="38" x2="39" y2="46"/>
    </g>
  </svg>`,
  dry:`<svg width="64" height="64" viewBox="0 0 64 64">
    <circle cx="32" cy="32" r="28" fill="none" stroke="#16202b" stroke-width="3"/>

    <g stroke="#16202b" stroke-width="3" stroke-linecap="round">
      <line x1="32" y1="10" x2="32" y2="16"/><line x1="32" y1="48" x2="32" y2="54"/>
      <line x1="10" y1="32" x2="16" y2="32"/><line x1="48" y1="32" x2="54" y2="32"/>
      <line x1="16" y1="16" x2="20" y2="20"/><line x1="44" y1="44" x2="48" y2="48"/>
      <line x1="48" y1="16" x2="44" y2="20"/><line x1="20" y1="44" x2="16" y2="48"/>
    </g>
  </svg>`
};

/* ---- "band": the VL/VR/HL/HR/XXXX + weather icons + numbers group, laid out
   as an aligned 5x3 grid, boxed with a border, cells edge-to-edge. ---- */
function makeBand(x0,y0,bandKey,scale){
  scale=scale||1;
  const baseCellW=104, baseCellH=92, cols=5, rows=3, basePad=10;
  const cellW=baseCellW*scale, cellH=baseCellH*scale, pad=basePad*scale;
  const boxW=cols*cellW+pad*2, boxH=rows*cellH+pad*2;
  const box=el('div');
  box.style.cssText='position:absolute;left:'+x0+'px;top:'+y0+'px;width:'+boxW+'px;height:'+boxH+'px;'+
    'border:2px solid #16202b;border-radius:'+(14*scale)+'px;box-sizing:border-box;z-index:0;pointer-events:none';
  stage.appendChild(box);
  const grid=[
    ['vl','VL','txt'],['vr','VR','txt'],['hl','HL','txt'],['hr','HR','txt'],['xxxx','XXXX','txt'],
    ['dry','DRY','icon'],['new','NEW','icon'],['cold','COLD','icon'],['km','KM','icon'],['n1234','0','txt'],
    ['wet','WET','icon'],['used','USED','icon'],['hot','HOT','icon'],['cycle','CYCLE','icon'],['n12','12','txt']
  ];
  grid.forEach((it,i)=>{
    const col=i%cols, row=Math.floor(i/cols);
    const px=x0+pad+col*cellW, py=y0+pad+row*cellH;
    const [baseKey,label,type]=it;
    const txtSize=(baseKey==='xxxx'||baseKey==='n1234'||baseKey==='n12')?32:40;
    const html=type==='icon'?(ICONS[baseKey]+'<div class="lbl">'+label+'</div>'):('<div class="txt" style="font-size:'+txtSize+'px">'+label+'</div>');
    const cellItem=makeItem(px,py,html,null,baseKey+'-band-'+bandKey);
    if(!cellItem)return;
    cellItem.style.width=baseCellW+'px';
    cellItem.style.height=baseCellH+'px';
    cellItem.style.boxSizing='border-box';
    cellItem.style.justifyContent='center';
    cellItem.style.borderRadius='0';
    cellItem.style.transformOrigin='top left';
    cellItem.dataset.scale=scale;
    cellItem.style.transform='scale('+scale+')';
    // click-to-toggle a faint green highlight (90% translucent -> opacity .1),
    // except on the KM / CYCLE / XXXX / 1234 / 12 blocks. Cells belong to
    // mutually-exclusive groups (only one active per group per band): the
    // position row VL/VR/HL/HR, plus hot/cold, wet/dry, new/used.
    if(BOARD_BANDS_EDITABLE&&BAND_EDITABLE.has(baseKey)){
      // XXXX / 1234 / 12: click makes the text editable; click again or Enter
      // ends editing (no edit possible).
      cellItem.style.cursor='text';
      const txt=cellItem.querySelector('.txt');
      // 1234 is a car number: format to 4 digits + reject duplicates on commit.
      const commit=()=>{
        if(!txt.isContentEditable)return;   // guard: re-entrant blur() below must not re-commit
        txt.contentEditable='false';txt.blur();
        // Persist to localStorage immediately (synchronous) so closing the
        // detailed view — which reparents & reloads this iframe — can't drop
        // the edit while the async car-number check is still in flight.
        saveBandStateLS();
        if(baseKey==='xxxx'){finalizeCarNumber(txt,bandKey,()=>syncBand(bandKey));}
        else{syncBand(bandKey);}
      };
      cellItem.addEventListener('click',()=>{
        if(txt.isContentEditable){commit();return;}
        txt.contentEditable='true';txt.focus();
        const sel=window.getSelection(),rng=document.createRange();rng.selectNodeContents(txt);rng.collapse(false);sel.removeAllRanges();sel.addRange(rng);
      });
      txt.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();commit();}});
      // Commit when focus leaves the cell (clicking elsewhere, closing the
      // detailed view, etc.) — previously only Enter or a second click saved.
      txt.addEventListener('blur',commit);
    }else if(BOARD_BANDS_EDITABLE&&!BAND_HL_EXCLUDE.has(baseKey)){
      cellItem.style.cursor='pointer';
      const grp=BAND_HL_GROUPS.find(g=>g.indexOf(baseKey)>=0);
      const setHl=(el,on)=>{el.dataset.hl=on?'1':'0';el.style.background=on?'rgba(30,143,58,0.1)':'#fff';};
      cellItem.addEventListener('click',()=>{
        const on=cellItem.dataset.hl==='1';
        if(on){setHl(cellItem,false);}
        else{
          // activating: clear the other members of this cell's group in this band
          if(grp)grp.forEach(k=>{if(k!==baseKey){const sib=document.querySelector('[data-key="'+k+'-band-'+bandKey+'"]');if(sib)setHl(sib,false);}});
          setHl(cellItem,true);
        }
        syncBand(bandKey);
      });
    }
  });
}
const BAND_HL_EXCLUDE=new Set(['km','cycle','xxxx','n1234','n12']);
const BAND_EDITABLE=new Set(['xxxx','n1234','n12']);
const BAND_HL_GROUPS=[['vl','vr','hl','hr'],['hot','cold'],['wet','dry'],['new','used']];
// TRACK + PIT board bands are read-only display; editing lives in STOCK instead.
const BOARD_BANDS_EDITABLE=false;

/* ---- band state persistence: localStorage (survives refresh) + Supabase
   table stint9_band_state (one row per band). ---- */
const BAND_KEYS=['tl','tr','bl','br','v1','v2','v3','v4'];
const BAND_HL_CELLS=['vl','vr','hl','hr','dry','new','cold','wet','used','hot'];
const BAND_TXT_CELLS=['xxxx','n1234','n12'];
const SB_URL='https://esvvzgxqnfszhttdkuzc.supabase.co',SB_KEY='sb_publishable_svmP7ATfuf9eK-jJGXjlYQ_qC8nONLU';
function readBandState(band){
  const active=BAND_HL_CELLS.filter(k=>{const e=document.querySelector('[data-key="'+k+'-band-'+band+'"]');return e&&e.dataset.hl==='1';});
  const texts={};BAND_TXT_CELLS.forEach(k=>{const e=document.querySelector('[data-key="'+k+'-band-'+band+'"] .txt');if(e)texts[k]=e.textContent;});
  return {active,texts};
}
function saveBandStateLS(){const st={};BAND_KEYS.forEach(b=>st[b]=readBandState(b));try{localStorage.setItem('stint9_band_state',JSON.stringify(st));}catch(e){}}
function loadBandStateLS(){try{return JSON.parse(localStorage.getItem('stint9_band_state'))||null;}catch(e){return null;}}
function applyBandState(st){if(!st)return;BAND_KEYS.forEach(b=>{const bs=st[b];if(!bs)return;
  BAND_HL_CELLS.forEach(k=>{const e=document.querySelector('[data-key="'+k+'-band-'+b+'"]');if(!e)return;const on=(bs.active||[]).indexOf(k)>=0;e.dataset.hl=on?'1':'0';e.style.background=on?'rgba(30,143,58,0.1)':'#fff';});
  if(bs.texts)Object.keys(bs.texts).forEach(k=>{const e=document.querySelector('[data-key="'+k+'-band-'+b+'"] .txt');if(e&&bs.texts[k]!=null)e.textContent=bs.texts[k];});
});}
const _bandSyncTimers={};
function syncBand(band){
  saveBandStateLS();
  clearTimeout(_bandSyncTimers[band]);
  _bandSyncTimers[band]=setTimeout(()=>{const bs=readBandState(band);
    fetch(SB_URL+'/rest/v1/stint9_band_state',{method:'POST',headers:{apikey:SB_KEY,Authorization:'Bearer '+SB_KEY,'Content-Type':'application/json',Prefer:'resolution=merge-duplicates,return=minimal'},
      body:JSON.stringify({band:band,active:bs.active,texts:bs.texts,updated_at:new Date().toISOString()})}).catch(()=>{});
  },500);
}
function fetchBandStateDB(){
  return fetch(SB_URL+'/rest/v1/stint9_band_state?select=band,active,texts',{headers:{apikey:SB_KEY,Authorization:'Bearer '+SB_KEY}})
    .then(r=>r.ok?r.json():[]).then(rows=>{if(!rows||!rows.length)return;const st={};rows.forEach(r=>{st[r.band]={active:r.active||[],texts:r.texts||{}};});applyBandState(st);saveBandStateLS();}).catch(()=>{});
}
/* ---- 1234 = car number: zero-pad to 4 digits and reject duplicates. On
   commit, gather the numbers already used by the other bands (both live in
   the DOM and persisted in the DB); if this number is taken, warn and bump to
   the next free number. ---- */
const pad4=n=>String(n).padStart(4,'0');
function finalizeCarNumber(txt, band, done){
  const digits=(txt.textContent||'').replace(/\D/g,'');
  if(digits===''){done();return;}          // empty is allowed (clears the number)
  const n=parseInt(digits,10);
  const domUsed=new Set();
  BAND_KEYS.forEach(b=>{if(b===band)return;const e=document.querySelector('[data-key="xxxx-band-'+b+'"] .txt');if(e){const d=(e.textContent||'').replace(/\D/g,'');if(d!=='')domUsed.add(pad4(parseInt(d,10)));}});
  const resolve=(used)=>{
    let cand=pad4(n);
    if(used.has(cand)){let m=n;while(used.has(pad4(m)))m++;const next=pad4(m);
      alert('Number '+cand+' already in use.\nNext available: '+next);cand=next;}
    txt.textContent=cand;done();
  };
  // merge DOM-used with DB-used (authoritative across devices), then resolve
  fetch(SB_URL+'/rest/v1/stint9_band_state?select=band,texts',{headers:{apikey:SB_KEY,Authorization:'Bearer '+SB_KEY}})
    .then(r=>r.ok?r.json():[]).then(rows=>{const used=new Set(domUsed);
      (rows||[]).forEach(r=>{if(r.band!==band&&r.texts&&r.texts.xxxx){const d=String(r.texts.xxxx).replace(/\D/g,'');if(d!=='')used.add(pad4(parseInt(d,10)));}});
      resolve(used);
    }).catch(()=>resolve(domUsed));
}
const BAND_SCALE=0.4;
const BW=(5*104+20)*BAND_SCALE, BH=(3*92+20)*BAND_SCALE;

/* ---- right column: 4 bands stacked vertically, the whole stack vertically
   centred on AXIS_Y. Built first so the corner bands can align to its
   inter-band gaps. ---- */
const TVW=110, AXIS_Y=360, compX=460, carCX=compX+TVW/2;
const stackX=900, stackGap=16;
const stackH=4*BH+3*stackGap;
const stackTop=AXIS_Y-stackH/2;
let stackY=stackTop;
for(let i=1;i<=4;i++){
  makeBand(stackX, stackY, 'v'+i, BAND_SCALE);
  stackY+=BH+stackGap;
}
const stackCenterX=stackX+BW/2;

/* ---- four corner bands: the top pair (tl/tr) vertically centred on the
   v1|v2 gap of the stack, the bottom pair (bl/br) on the v3|v4 gap — so the
   corner rows line up with the stack's inter-band boundaries. ---- */
const topGapY=stackTop+BH+stackGap/2;
const botGapY=stackTop+3*BH+2.5*stackGap;
makeBand(compX-BW-16, topGapY-BH/2, 'tl', BAND_SCALE);
makeBand(compX+TVW+16, topGapY-BH/2, 'tr', BAND_SCALE);
makeBand(compX-BW-16, botGapY-BH/2, 'bl', BAND_SCALE);
makeBand(compX+TVW+16, botGapY-BH/2, 'br', BAND_SCALE);

/* car.png centred between the four bands (under TRACK); transparent container
   so no white box shows. Rotated 90deg clockwise from nose-up -> nose-right. */
const carEl=makeItem(carCX, AXIS_Y, '<img src="car.png" alt="car" style="width:118px;height:auto;display:block">', 'bg-layer', 'car-img', 0);
carEl.style.transform='translate(-50%,-50%)';
carEl.style.background='none'; carEl.style.boxShadow='none'; carEl.style.padding='0';

/* ---- labels: STINT (far left) / STOCK (far right) both centred on AXIS_Y;
   TRACK (over the car) / PIT (over the right stack) share the top row. ---- */
const stintEl=makeItem(70, AXIS_Y, '<div class="txt" style="background:#c9ccd1">&#9664; STINT</div>', null, 'stint1');
stintEl.style.transform='translateY(-50%)';
const stockEl=makeItem(stackX+BW+40, AXIS_Y, '<div class="txt" style="background:#c9ccd1">STOCK &#9654;</div>', null, 'stock');
stockEl.style.transform='translateY(-50%)';
const trackEl=makeItem(carCX, 30, '<div class="txt" style="background:#c9ccd1">TRACK</div>', null, 'track');
trackEl.style.transform='translateX(-50%)';
makeItem(stackCenterX-38, 30, '<div class="txt" style="background:#c9ccd1">PIT</div>', null, 'pit');

/* blank space at the bottom of the page, below everything else */
const bottomSpacer=el('div');
bottomSpacer.style.cssText='position:absolute;left:0;top:640px;width:1px;height:120px;';
stage.appendChild(bottomSpacer);

/* restore band state: instantly from localStorage (survives refresh), then
   reconcile with the Supabase table (authoritative across devices). */
applyBandState(loadBandStateLS());
fetchBandStateDB();

/* ================= horizontal TYRE sub-reels: STINT | BOARD | STOCK =========
   The dashboard's main reel scrolls vertically; here we add a horizontal reel
   *within* the TYRE reel — STINT (used sets) to the LEFT, STOCK (available
   sets) to the RIGHT of the board. Clicking the board's STINT / STOCK labels
   slides horizontally to those panels; each side panel is a horizontal-scroll
   reel of sets, one column (4 stacked bands = 4 tyres) per set. ---- */
/* ---- STOCK bands are adjustable (click-to-toggle highlights + editable
   id/km/cycle text), persisted per band to localStorage. TRACK/PIT and STINT
   bands are read-only (pBand called without an editKey). ---- */
const STOCK_AXIS={vl:'pos',vr:'pos',hl:'pos',hr:'pos',dry:'cond',wet:'cond',new:'wear',used:'wear',cold:'temp',hot:'temp'};
let STOCK_STATE={};try{STOCK_STATE=JSON.parse(localStorage.getItem('stint9_stock_state'))||{};}catch(e){}
function saveStock(){try{localStorage.setItem('stint9_stock_state',JSON.stringify(STOCK_STATE));}catch(e){}}
function stockMerge(base,bandKey){const st=STOCK_STATE[bandKey];return st?Object.assign({},base||{},st):(base||{});}
function pBand(t,editKey){
  t=t||{};const b=document.createElement('div');b.className='pband';
  const grid=[
    {k:'vl',l:'VL',t:'pos'},{k:'vr',l:'VR',t:'pos'},{k:'hl',l:'HL',t:'pos'},{k:'hr',l:'HR',t:'pos'},{k:'id',v:(t.id||'----'),t:'ed',f:'id'},
    {k:'dry',l:'DRY',t:'ico',hl:1},{k:'new',l:'NEW',t:'ico',hl:1},{k:'cold',l:'COLD',t:'ico',hl:1},{k:'km',l:'KM',t:'ico'},{k:'km#',v:(t.km!=null?t.km:'—'),t:'ed',f:'km'},
    {k:'wet',l:'WET',t:'ico',hl:1},{k:'used',l:'USED',t:'ico',hl:1},{k:'hot',l:'HOT',t:'ico',hl:1},{k:'cycle',l:'CYCLE',t:'ico'},{k:'cyc#',v:(t.cycle!=null?t.cycle:'—'),t:'ed',f:'cycle'}
  ];
  const active=new Set([t.pos,t.cond,t.wear,t.temp].filter(Boolean));
  grid.forEach(g=>{
    const c=document.createElement('div');c.className='pcell';c.dataset.k=g.k;
    const isHl=(g.t==='pos'||g.hl);
    if(isHl&&active.has(g.k))c.classList.add('hl');
    if(g.t==='pos')c.innerHTML='<div class="pt">'+g.l+'</div>';
    else if(g.t==='ico')c.innerHTML=ICONS[g.k]+'<div class="plbl">'+g.l+'</div>';
    else c.innerHTML='<div class="'+(g.k==='id'?'pid':'pn')+'">'+g.v+'</div>';
    if(editKey)wireStockCell(c,g,b,editKey);
    b.appendChild(c);
  });
  return b;
}
function wireStockCell(c,g,band,editKey){
  const isHl=(g.t==='pos'||g.hl);
  if(isHl){
    const axis=STOCK_AXIS[g.k];c.style.cursor='pointer';
    c.addEventListener('click',()=>{
      const on=c.classList.contains('hl');
      band.querySelectorAll('.pcell.hl').forEach(sib=>{if(STOCK_AXIS[sib.dataset.k]===axis)sib.classList.remove('hl');});
      const st=STOCK_STATE[editKey]||(STOCK_STATE[editKey]={});
      if(on){st[axis]=null;}else{c.classList.add('hl');st[axis]=g.k;}
      saveStock();
    });
  }else if(g.t==='ed'){
    const txt=c.querySelector('.pid,.pn');const field=g.f||'id';c.style.cursor='text';
    const commit=()=>{if(!txt.isContentEditable)return;txt.contentEditable='false';const st=STOCK_STATE[editKey]||(STOCK_STATE[editKey]={});st[field]=txt.textContent.trim();saveStock();};
    c.addEventListener('click',()=>{if(txt.isContentEditable){commit();return;}txt.contentEditable='true';txt.focus();const sel=window.getSelection(),r=document.createRange();r.selectNodeContents(txt);r.collapse(false);sel.removeAllRanges();sel.addRange(r);});
    txt.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();commit();}});
    txt.addEventListener('blur',commit);
  }
}
function pSet(s,kind,setIdx){
  const col=document.createElement('div');col.className='pset '+kind+(s.placeholder?' placeholder':'');
  const h=document.createElement('div');h.className='psetlbl';h.textContent=s.label;col.appendChild(h);
  s.tyres.forEach((t,ti)=>{
    if(s.placeholder){const b=document.createElement('div');b.className='pband placeholder';col.appendChild(b);return;}
    if(kind==='stock'){const bk='stock-'+setIdx+'-'+ti;col.appendChild(pBand(stockMerge(t,bk),bk));}
    else col.appendChild(pBand(stintTransfer(t,kind)));
  });
  return col;
}
/* TRACK -> STINT transfer = one heat cycle: a band that comes off the car (hot)
   cools down (hot -> cold) and its cycle count (heat cycles) goes up by 1. */
function stintTransfer(t,kind){
  if(kind==='stint'&&t&&t.temp==='hot')return Object.assign({},t,{temp:'cold',cycle:(t.cycle!=null?t.cycle+1:t.cycle)});
  return t;
}
function pEmptySet(label){return {label,placeholder:true,tyres:[0,0,0,0]};}
function pMakeSet(label,baseId,cond,wear,temp,km,cycle){
  // each of the 4 tyres gets its OWN unique serial (base, base+1, …) — a band
  // serial number is globally unique and can only appear in one rectangle.
  const pos=['vl','vr','hl','hr'],base=parseInt(baseId,10)||0;
  return {label,tyres:pos.map((p,i)=>({pos:p,cond,wear,temp,id:pad4(base+i),km:km+i,cycle}))};
}
const STINT_SETS=[
  pMakeSet('Stint 1 · 0001','0001','dry','used','cold',305,3),
  pEmptySet('Stint 2 · 0002'),
  pEmptySet('Stint 3 · 0003'),
  pEmptySet('Stint 4 · 0004'),
  pEmptySet('Stint 5 · 0005')
];
const STOCK_SETS=[
  pMakeSet('Set A · 0011','0011','dry','new','cold',0,0),
  pMakeSet('Set B · 0015','0015','dry','new','cold',0,0),
  pMakeSet('Set C · 0019','0019','wet','new','cold',0,0),
  pMakeSet('Set D · 0023','0023','dry','new','cold',0,0),
  pMakeSet('Set E · 0027','0027','wet','new','cold',0,0),
  pEmptySet('Set F · 0031')
];
function buildPanel(panelId,titleMain,titleSub,kind,sets,backSide){
  const p=document.getElementById(panelId);p.innerHTML='';   // re-callable (STINT rebuilds after a transfer)
  const hd=document.createElement('div');hd.className='phd';
  const back='<button class="hbtn" data-goto="1" title="back to board">'+(backSide==='left'?'&#9664;':'&#9654;')+'</button>';
  const title='<div class="ptitle">'+titleMain+'<small>'+titleSub+'</small></div>';
  hd.innerHTML=backSide==='left'?(back+title):(title+back);
  const gb=hd.querySelector('[data-goto]');if(gb)gb.addEventListener('click',()=>goH(+gb.dataset.goto));
  p.appendChild(hd);
  const wrap=document.createElement('div');wrap.className='preelwrap';
  const reel=document.createElement('div');reel.className='preel';
  sets.forEach((s,i)=>reel.appendChild(pSet(s,kind,i)));
  wrap.appendChild(reel);p.appendChild(wrap);
}
/* sets transferred from TRACK during pitstops fill STINT's empty slots in order */
let STINT_XFERS=[];try{STINT_XFERS=JSON.parse(localStorage.getItem('stint9_stint_xfers'))||[];}catch(e){}
function saveXfers(){try{localStorage.setItem('stint9_stint_xfers',JSON.stringify(STINT_XFERS));}catch(e){}}
function stintSetsWithXfers(){
  // A band serial can only exist in one rectangle: reserve the fixed sets'
  // serials, then drop any transfer that reuses an already-seen serial.
  const seen=new Set();
  STINT_SETS.forEach(s=>{if(!s.placeholder)(s.tyres||[]).forEach(t=>{if(t&&t.id)seen.add(t.id);});});
  const clean=[];
  STINT_XFERS.forEach(tyres=>{const ids=(tyres||[]).map(t=>t&&t.id).filter(Boolean);
    if(ids.some(id=>seen.has(id)))return;      // duplicate serial → skip (no doubles)
    ids.forEach(id=>seen.add(id));clean.push(tyres);});
  if(clean.length!==STINT_XFERS.length){STINT_XFERS=clean;saveXfers();}
  let xi=0;
  return STINT_SETS.map(s=>(s.placeholder&&xi<clean.length)?{label:s.label,tyres:clean[xi++]}:s);
}
function rebuildStintPanel(){buildPanel('stintPanel','STINT','used sets · 4 tyres per column','stint',stintSetsWithXfers(),'right');}
rebuildStintPanel();
buildPanel('stockPanel','STOCK','available sets · 4 tyres per column','stock',STOCK_SETS,'left');

/* horizontal navigation: 0 STINT · 1 BOARD · 2 STOCK */
const reelh=document.getElementById('reelh');
let hIdx=1;
function goH(i){hIdx=Math.max(0,Math.min(2,i));reelh.style.transform='translateX(-'+(hIdx*100)+'vw)';try{localStorage.setItem('test2_hidx',hIdx);}catch(e){}}
let hStart=1;try{const v=parseInt(localStorage.getItem('test2_hidx'),10);if(v>=0&&v<=2)hStart=v;}catch(e){}
reelh.style.transition='none';goH(hStart);requestAnimationFrame(()=>{reelh.style.transition='';});
// keyboard: Left/Right flips the horizontal reel when the board itself has focus
window.addEventListener('keydown',e=>{
  const t=e.target;if(t&&(t.isContentEditable||t.tagName==='INPUT'||t.tagName==='TEXTAREA'))return;
  if(e.key==='ArrowLeft'){e.preventDefault();goH(hIdx-1);}
  else if(e.key==='ArrowRight'){e.preventDefault();goH(hIdx+1);}
  // Up/Down step the parent's vertical reel. When the user has clicked inside
  // this iframe, focus is here (not the parent), so forward it up.
  else if(e.key==='ArrowUp'||e.key==='ArrowDown'){e.preventDefault();try{window.parent.postMessage({type:'reelV',dir:e.key==='ArrowDown'?1:-1},'*');}catch(err){}}
});
// ...and when the parent dashboard (which owns focus for the reel arrows)
// forwards a Left/Right press to us
window.addEventListener('message',e=>{const d=e.data;if(d&&d.type==='tyreH')goH(hIdx+(d.dir>0?1:-1));});
// board STINT/STOCK labels become the buttons into the side panels
stintEl.dataset.nav='1';stintEl.title='show used sets (STINT)';stintEl.addEventListener('click',()=>goH(0));
stockEl.dataset.nav='1';stockEl.title='show available sets (STOCK)';stockEl.addEventListener('click',()=>goH(2));

/* ================= TRACK -> STINT transfer (pitstop) ========================
   A button on the car roof. On click the 4 TRACK bands animate: first gather
   into a vertical stack (like a placeholder column), then slide left into the
   STINT reel — where they land as the next used set (hot->cold + cycle +1). */
function captureTyreRaw(band){
  const bs=readBandState(band),a=bs.active||[],tx=bs.texts||{};
  const pick=arr=>arr.find(k=>a.indexOf(k)>=0)||null;
  return {pos:pick(['vl','vr','hl','hr']),cond:pick(['dry','wet']),wear:pick(['new','used']),temp:pick(['hot','cold']),
    id:tx.xxxx||'----',km:(tx.n1234!=null?tx.n1234:'—'),cycle:(parseInt(tx.n12,10)||0)};
}
function tyreTransfer(t){return (t&&t.temp==='hot')?Object.assign({},t,{temp:'cold',cycle:(t.cycle||0)+1}):t;}
function setBandCellsVisible(band,vis){document.querySelectorAll('[data-key$="-band-'+band+'"]').forEach(e=>{e.style.visibility=vis?'':'hidden';});}
const TRACK_BANDS=['tl','tr','bl','br']; // VL, VR, HL, HR
let xferBusy=false,trackMoved=false;try{trackMoved=localStorage.getItem('stint9_track_moved')==='1';}catch(e){}
const xferBtn=el('div');xferBtn.id='xferBtn';xferBtn.innerHTML='&#9664;';xferBtn.title='move TRACK set to STINT (pitstop)';
xferBtn.style.cssText='position:absolute;left:'+carCX+'px;top:'+AXIS_Y+'px;transform:translate(-50%,-50%)';
stage.appendChild(xferBtn);
xferBtn.addEventListener('click',doTransfer);
// keep TRACK empty across refreshes once a set has been moved off it
if(trackMoved){TRACK_BANDS.forEach(b=>setBandCellsVisible(b,false));xferBtn.classList.add('busy');}
function doTransfer(){
  if(xferBusy||trackMoved)return;
  const emptySlots=STINT_SETS.filter(s=>s.placeholder).length;
  if(STINT_XFERS.length>=emptySlots)return;      // no empty STINT slot left
  xferBusy=true;xferBtn.classList.add('busy');
  const raw=TRACK_BANDS.map(captureTyreRaw);
  // clone overlay: one compact band per TRACK corner, starting over the originals
  // overlay on the body (not the sliding board) so the clones travel across the
  // screen into STINT independently of the reel's horizontal slide
  const overlay=el('div');overlay.style.cssText='position:fixed;inset:0;z-index:9999;pointer-events:none';document.body.appendChild(overlay);
  const corners=[[336,225.6],[694,225.6],[336,494.4],[694,494.4]]; // tl,tr,bl,br centres
  const EASE='cubic-bezier(.55,.06,.2,1)';
  const clones=raw.map((t,i)=>{
    const c=pBand(t);
    c.style.cssText='position:absolute;left:'+corners[i][0]+'px;top:'+corners[i][1]+'px;transform:translate(-50%,-50%);'+
      'transition:left .5s '+EASE+',top .5s '+EASE+',opacity .4s;box-shadow:0 6px 20px rgba(0,0,0,.25)';
    overlay.appendChild(c);return c;
  });
  setBandCellsVisible0();                          // hide originals so it reads as a lift-off
  function setBandCellsVisible0(){TRACK_BANDS.forEach(b=>setBandCellsVisible(b,false));}
  // phase 1: gather into a vertical stack (like the placeholder column)
  const stackX=430,stackY0=112,step=140;
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    clones.forEach((c,i)=>{c.style.left=stackX+'px';c.style.top=(stackY0+i*step)+'px';});
  }));
  // phase 2: slide the stack left toward STINT (stay on the board — no reel flip)
  setTimeout(()=>{
    clones.forEach(c=>{c.style.transition='left .6s '+EASE+',top .6s '+EASE+',opacity .6s';c.style.left='-260px';c.style.opacity='0';});
  },640);
  // land: record the transfer (cooled + cycle+1), rebuild STINT, tidy up. The
  // set lands in STINT's next empty slot; TRACK stays empty (persisted).
  setTimeout(()=>{
    overlay.remove();
    STINT_XFERS.push(raw.map(tyreTransfer));saveXfers();rebuildStintPanel();updateStintBadge();
    trackMoved=true;xferBusy=false;xferBtn.classList.add('busy');
    try{localStorage.setItem('stint9_track_moved','1');}catch(e){}
  },1320);
}
/* red badge on the STINT button = number of sets currently in STINT (filled
   columns), like an unread-SMS count on an iPhone app icon. */
function updateStintBadge(){
  const n=stintSetsWithXfers().filter(s=>!s.placeholder).length;
  let b=document.getElementById('stintBadge');
  if(!b){b=el('span');b.id='stintBadge';stintEl.appendChild(b);}
  b.textContent=n;b.style.display=n>0?'flex':'none';
}
updateStintBadge();

</script>
