<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>test2</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#fff;font-family:'IBM Plex Mono',ui-monospace,monospace}
  .item{position:absolute;cursor:pointer;user-select:none;display:flex;flex-direction:column;align-items:center;gap:2px;
    padding:6px;border:2px solid transparent;border-radius:10px;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.08);z-index:1}
  .item.bg-layer{z-index:0}
  .item{cursor:default}
  .item svg{display:block}
  .item .lbl{font-size:10px;color:#6b7480;letter-spacing:.5px}
  .txt{font-size:20px;font-weight:700;color:#16202b;background:#fff;padding:6px 12px;border-radius:8px}
  .btn{font-size:16px;font-weight:700;color:#fff;background:#16202b;padding:10px 18px;border-radius:8px;border:none}
  .arrowwrap{padding:0;background:none;box-shadow:none}

  /* ---- horizontal TYRE sub-reel: STINT | BOARD | STOCK (3 panels wide) ---- */
  #reelh{position:absolute;top:0;left:0;height:100vh;display:flex;transform:translateX(-100vw);
    transition:transform .45s cubic-bezier(.55,.06,.2,1);will-change:transform}
  .hpanel{flex:0 0 100vw;width:100vw;height:100vh;position:relative;overflow:hidden}
  /* the board's STINT / STOCK labels act as the buttons into the side panels */
  .item[data-nav]{cursor:pointer}
  .item[data-nav]:hover .txt{background:#b3b7bd!important}
  /* side-panel chrome */
  .phd{position:absolute;top:0;left:0;right:0;display:flex;align-items:flex-start;justify-content:space-between;gap:16px;padding:20px 28px;z-index:5}
  .ptitle{font-size:24px;font-weight:700;letter-spacing:2px;color:#16202b}
  .ptitle small{display:block;font-size:12px;letter-spacing:1px;color:#6b7480;font-weight:500;margin-top:4px;text-transform:uppercase}
  /* back-to-board button: arrow only, same style/format as the up/down reel
     nav buttons (grey pill, white triangle, rounded, soft shadow). */
  .hbtn{background:#8a929b;color:#fff;border:none;border-radius:7px;width:34px;height:46px;font-size:19px;line-height:1;
    cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.18);display:flex;align-items:center;justify-content:center;padding:0}
  .hbtn:hover{background:#6b7480}
  /* car-roof button: move the TRACK set to STINT (same style as the reel nav) */
  #xferBtn{background:#8a929b;color:#fff;border-radius:5px;width:27px;height:32px;display:flex;align-items:center;justify-content:center;
    font-size:15px;line-height:1;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.3);z-index:7;user-select:none}
  #xferBtn:hover{background:#6b7480}
  #xferBtn.busy{opacity:.35;pointer-events:none}
  /* on-board mount/unmount arrows (◀ PIT→TRACK, ▶ TRACK→PIT) — same size as #xferBtn */
  .hnavbtn{position:absolute;background:#8a929b;color:#fff;border-radius:5px;width:27px;height:32px;display:flex;align-items:center;justify-content:center;
    font-size:15px;line-height:1;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.3);z-index:7;user-select:none}
  .hnavbtn:hover{background:#6b7480}
  .hnavbtn.busy{opacity:.35;pointer-events:none}
  /* iPhone-style unread badge on the STINT button: how many sets are in STINT */
  #stintBadge,#stockBadge{position:absolute;top:-9px;right:-9px;min-width:24px;height:24px;padding:0 6px;box-sizing:border-box;border-radius:12px;
    background:#e0301e;color:#fff;font-family:inherit;font-size:13px;font-weight:700;display:none;align-items:center;justify-content:center;
    box-shadow:0 1px 3px rgba(0,0,0,.4);z-index:9;line-height:1}
  .preelwrap{position:absolute;left:0;right:0;top:92px;bottom:16px;display:flex;align-items:center}
  .preel{display:flex;gap:22px;overflow-x:auto;padding:6px 28px;width:100%;box-sizing:border-box;scroll-snap-type:x proximity}
  .preel::-webkit-scrollbar{height:10px}.preel::-webkit-scrollbar-thumb{background:#c3c8ce;border-radius:5px}
  .pset{display:flex;flex-direction:column;gap:7px;flex:0 0 auto;scroll-snap-align:start}
  .psetlbl{font-size:12px;letter-spacing:1px;text-transform:uppercase;font-weight:700;text-align:center;color:#16202b;padding:5px 8px;border-radius:6px}
  .pset.stint .psetlbl{background:#e7ecf5}.pset.stock .psetlbl{background:#e9f2ea}
  /* arrow-down button under a STINT set: retire the set to STOCK (password) */
  .setretire{align-self:center;margin-top:3px;width:60px;height:22px;border-radius:6px;background:#8a929b;color:#fff;
    display:flex;align-items:center;justify-content:center;font-size:14px;line-height:1;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.25);user-select:none}
  .setretire:hover{background:#6b7480}
  /* STOCK "send 4 tyres to PIT" controls (in the STOCK header) */
  .stockctl{display:flex;align-items:center;gap:18px}
  /* STOCK header: pips/to-PIT glued next to the back arrow (left), STOCK title far right */
  .phd-left{display:flex;align-items:flex-start;gap:16px}
  .phd-right{display:flex;align-items:flex-start;gap:18px}
  .stockcta{display:flex;flex-direction:column;align-items:center;gap:6px}
  .stockcta-row{display:flex;align-items:center;gap:14px}
  .stockctltxt{font-size:14px;color:#16202b;font-weight:600;letter-spacing:.5px}
  .stockmax{font-size:13px;color:#6b7480;font-weight:600;letter-spacing:.5px;display:inline-flex;align-items:center;gap:6px}
  .stockmax input{width:70px;font-family:inherit;font-size:13px;font-weight:700;color:#16202b;padding:5px 7px;border:1.5px solid #cfd4da;border-radius:6px}
  /* over-limit KM: two thin red diagonals corner-to-corner (border-thickness lines) */
  .bandcross{position:absolute;inset:0;pointer-events:none;z-index:4}
  .bandcross svg{width:100%;height:100%;display:block}
  .bandcross line{stroke:#e0301e;stroke-width:2;vector-effect:non-scaling-stroke}
  .stockpips{display:inline-flex;gap:6px}

  .stockpips i.on{background:#1e8f3a;border-color:#1e8f3a}
  .topitbtn{font-family:inherit;font-size:13px;font-weight:700;letter-spacing:1px;color:#fff;background:#b8bdc4;border:none;padding:7px 14px;border-radius:7px;cursor:not-allowed}
  .topitbtn.ready{background:#e0301e;cursor:pointer}
  .topitbtn.ready:hover{background:#c0271a}
  .pband{position:relative;display:grid;grid-template-columns:repeat(5,40px);grid-template-rows:repeat(3,44px);border:2px solid #16202b;border-radius:9px;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.08)}
  /* STOCK band select toggle (top-right); selected = 3x border, margin -4px keeps neighbours from shifting */
  .bandsel{position:absolute;top:-13px;right:-13px;width:26px;height:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:6}

  .bandsel:hover{opacity:.6}
  .pband.selected{border-width:6px;margin:-4px}
  /* empty parking spot: keep the rectangle, no icons — a band drops in here
     after a set is moved to PIT during a pitstop */
  .pband.placeholder{display:block;width:200px;height:132px;background:#f7f8fa;box-shadow:none}
  /* "add new tyre" plus on the top-right-most placeholder */
  .pband.addnew{display:flex;align-items:center;justify-content:center;cursor:pointer}
  .pband.addnew .plus{font-size:72px;font-weight:200;line-height:1;color:#9aa2ab;transition:color .15s}
  .pband.addnew:hover{background:#eef4ef}
  .pband.addnew:hover .plus{color:#1e8f3a}
  .pcell{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px}
  .pcell.hl{background:rgba(30,143,58,.12)}
  .pcell svg{width:28px;height:28px;display:block}

  .pcell .pt{font-size:16px;font-weight:700;color:#16202b}
  .pcell .pid{font-size:13px;font-weight:700;color:#16202b}
  .pcell .pn{font-size:14px;font-weight:700;color:#16202b}
</style>

<body>
<div id="reelh">

<script>
function el(tag,cls){const e=document.createElement(tag);if(cls)e.className=cls;return e;}
const stage=document.getElementById('stage');

/* ---- scale/rotation persistence across refresh ---- */
function loadState(key){try{return JSON.parse(localStorage.getItem('test2_v1_'+key));}catch(e){return null;}}
function saveState(key,x,y,scale,rot){try{localStorage.setItem('test2_v1_'+key,JSON.stringify({x,y,scale,rot}));}catch(e){}}

/* one-time reset: this version bakes the final layout into the code below,
   so wipe any saved positions/flags from the earlier drag-era experiments
   and let the code define everything. Runs once (guarded by a version key). */
try{
  if(localStorage.getItem('test2_layout_v2')!=='1'){
    Object.keys(localStorage).filter(k=>k.indexOf('test2_')===0).forEach(k=>localStorage.removeItem(k));
    localStorage.setItem('test2_layout_v2','1');
  }
}catch(e){}
/* the car briefly had double-click-to-rotate; wipe any stale saved rotation so
   the car always uses its code orientation (nose-up). It's not interactive now,
   so nothing re-saves it. */
try{localStorage.removeItem('test2_v1_car-img');localStorage.removeItem('test2_v1_topview-ref');}catch(e){}

function makeItem(x,y,innerHTML,extraCls,key,initialRot){
  const saved=key?loadState(key):null;
  const d=el('div','item'+(extraCls?(' '+extraCls):''));
  const sx=saved?saved.x:x, sy=saved?saved.y:y, sscale=saved&&saved.scale?saved.scale:1;
  const srot=saved&&saved.rot!=null?saved.rot:(initialRot||0);
  d.style.left=sx+'px';d.style.top=sy+'px';
  d.dataset.scale=sscale;
  if(sscale!==1)d.style.transform='scale('+sscale+')';
  if(key)d.dataset.key=key;
  d.innerHTML=innerHTML;
  const graphic=d.querySelector('svg,img');
  d.dataset.rot=srot;
  if(graphic&&srot)graphic.style.transform='rotate('+srot+'deg)';
  stage.appendChild(d);
  return d;
}

/* ---- icons (inline SVG, styled to match the reference set) ---- */
const ICONS={
  hot:`<svg width="64" height="64" viewBox="0 0 64 64">

      <line x1="4" y1="18" x2="16" y2="18"/><line x1="4" y1="26" x2="16" y2="26"/><line x1="4" y1="34" x2="14" y2="34"/>
      <path d="M28 10 v26 a8 8 0 1 0 8 0 V10 a4 4 0 0 0 -8 0 Z"/>
      <circle cx="32" cy="46" r="4" fill="#e0301e"/>
    </g>
    <path d="M46 24 C40 32 42 38 47 40 C44 34 48 32 48 28 C52 32 52 40 46 46 C56 44 58 30 46 24 Z" fill="#f3a6a0" opacity=".85"/>
  </svg>`,
  cold:`<svg width="64" height="64" viewBox="0 0 64 64">
    <g stroke="#2f5fd0" stroke-width="3" fill="none" stroke-linecap="round">
      <line x1="4" y1="18" x2="16" y2="18"/><line x1="4" y1="26" x2="16" y2="26"/><line x1="4" y1="34" x2="14" y2="34"/>
      <path d="M28 10 v26 a8 8 0 1 0 8 0 V10 a4 4 0 0 0 -8 0 Z"/>
      <circle cx="32" cy="46" r="4" fill="#2f5fd0"/>
    </g>
    <g stroke="#2f5fd0" stroke-width="2.5" stroke-linecap="round">
      <line x1="46" y1="18" x2="46" y2="38"/><line x1="38" y1="28" x2="54" y2="28"/>
      <line x1="40" y1="21" x2="52" y2="35"/><line x1="52" y1="21" x2="40" y2="35"/>
    </g>

  new:`<svg width="64" height="64" viewBox="0 0 64 64">

    <text x="32" y="37" text-anchor="middle" font-family="IBM Plex Mono,monospace" font-weight="700" font-size="13" fill="#16202b">NEW</text>
  </svg>`,
  used:`<svg width="64" height="64" viewBox="0 0 64 64">
    <g fill="#16202b">
      <path d="M8 22 h34 v-8 l16 12 -16 12 v-8 h-34 z"/>

    </g>

  km:`<svg width="64" height="64" viewBox="0 0 64 64">
    <g fill="#16202b">
      <path d="M14 6 a9 9 0 0 1 9 9 c0 7 -9 17 -9 17 s-9 -10 -9 -17 a9 9 0 0 1 9 -9 z"/>
      <circle cx="14" cy="15" r="4" fill="#fff"/>
      <path d="M50 6 a9 9 0 0 1 9 9 c0 7 -9 17 -9 17 s-9 -10 -9 -17 a9 9 0 0 1 9 -9 z"/>
      <circle cx="50" cy="15" r="4" fill="#fff"/>
    </g>
    <line x1="6" y1="50" x2="58" y2="50" stroke="#16202b" stroke-width="3"/>
    <text x="32" y="46" text-anchor="middle" font-family="IBM Plex Mono,monospace" font-weight="700" font-size="14" fill="#16202b">KM</text>
  </svg>`,
  cycle:`<svg width="64" height="64" viewBox="0 0 64 64">
    <g stroke="#e0301e" stroke-width="3" fill="none" stroke-linecap="round">
      <path d="M12 22 a20 20 0 0 1 34 -8"/>
      <polygon points="46,6 46,16 56,11" fill="#e0301e" stroke="none"/>
      <path d="M52 42 a20 20 0 0 1 -34 8"/>

      <path d="M24 26 q4 -6 8 0 q4 6 8 0" stroke-width="2.5"/>

      <line x1="22" y1="38" x2="19" y2="46"/><line x1="32" y1="38" x2="29" y2="46"/><line x1="42" y1="38" x2="39" y2="46"/>

    <g stroke="#16202b" stroke-width="3" stroke-linecap="round">
      <line x1="32" y1="10" x2="32" y2="16"/><line x1="32" y1="48" x2="32" y2="54"/>
      <line x1="10" y1="32" x2="16" y2="32"/><line x1="48" y1="32" x2="54" y2="32"/>
      <line x1="16" y1="16" x2="20" y2="20"/><line x1="44" y1="44" x2="48" y2="48"/>
      <line x1="48" y1="16" x2="44" y2="20"/><line x1="20" y1="44" x2="16" y2="48"/>

  </svg>`
};

/* ---- "band": the VL/VR/HL/HR/XXXX + weather icons + numbers group, laid out
   as an aligned 5x3 grid, boxed with a border, cells edge-to-edge. ---- */
function makeBand(x0,y0,bandKey,scale){
  scale=scale||1;
  const baseCellW=104, baseCellH=92, cols=5, rows=3, basePad=10;
  const cellW=baseCellW*scale, cellH=baseCellH*scale, pad=basePad*scale;
  const boxW=cols*cellW+pad*2, boxH=rows*cellH+pad*2;
  const box=el('div');
  box.style.cssText='position:absolute;left:'+x0+'px;top:'+y0+'px;width:'+boxW+'px;height:'+boxH+'px;'+
    'border:2px solid #16202b;border-radius:'+(14*scale)+'px;box-sizing:border-box;z-index:0;pointer-events:none';
  stage.appendChild(box);
  // over-max-KM red cross overlay (hidden until the band's KM exceeds MAX_KM),
  // matching the STOCK/STINT band cross. Toggled by updateBandCross().
  const cross=el('div');cross.dataset.key='cross-band-'+bandKey;
  cross.style.cssText='position:absolute;left:'+x0+'px;top:'+y0+'px;width:'+boxW+'px;height:'+boxH+'px;z-index:6;pointer-events:none;display:none';
  cross.innerHTML='<svg viewBox="0 0 100 100" preserveAspectRatio="none" style="width:100%;height:100%;display:block">'+
    '<line x1="0" y1="0" x2="100" y2="100" stroke="#e0301e" stroke-width="2" vector-effect="non-scaling-stroke"/>'+
    '<line x1="100" y1="0" x2="0" y2="100" stroke="#e0301e" stroke-width="2" vector-effect="non-scaling-stroke"/></svg>';
  stage.appendChild(cross);
  const grid=[
    ['vl','VL','txt'],['vr','VR','txt'],['hl','HL','txt'],['hr','HR','txt'],['xxxx','XXXX','txt'],
    ['dry','DRY','icon'],['new','NEW','icon'],['cold','COLD','icon'],['km','KM','icon'],['n1234','0','txt'],
    ['wet','WET','icon'],['used','USED','icon'],['hot','HOT','icon'],['cycle','CYCLE','icon'],['n12','12','txt']
  ];
  grid.forEach((it,i)=>{
    const col=i%cols, row=Math.floor(i/cols);
    const px=x0+pad+col*cellW, py=y0+pad+row*cellH;
    const [baseKey,label,type]=it;
    const txtSize=(baseKey==='xxxx'||baseKey==='n1234'||baseKey==='n12')?32:40;
    const html=type==='icon'?(ICONS[baseKey]+'<div class="lbl">'+label+'</div>'):('<div class="txt" style="font-size:'+txtSize+'px">'+label+'</div>');
    const cellItem=makeItem(px,py,html,null,baseKey+'-band-'+bandKey);
    if(!cellItem)return;
    cellItem.style.width=baseCellW+'px';
    cellItem.style.height=baseCellH+'px';
    cellItem.style.boxSizing='border-box';
    cellItem.style.justifyContent='center';
    cellItem.style.borderRadius='0';
    cellItem.style.transformOrigin='top left';
    cellItem.dataset.scale=scale;
    cellItem.style.transform='scale('+scale+')';
    // click-to-toggle a faint green highlight (90% translucent -> opacity .1),
    // except on the KM / CYCLE / XXXX / 1234 / 12 blocks. Cells belong to
    // mutually-exclusive groups (only one active per group per band): the
    // position row VL/VR/HL/HR, plus hot/cold, wet/dry, new/used.
    if(BOARD_BANDS_EDITABLE&&BAND_EDITABLE.has(baseKey)){
      // XXXX / 1234 / 12: click makes the text editable; click again or Enter
      // ends editing (no edit possible).
      cellItem.style.cursor='text';
      const txt=cellItem.querySelector('.txt');
      // 1234 is a car number: format to 4 digits + reject duplicates on commit.
      const commit=()=>{
        if(!txt.isContentEditable)return;   // guard: re-entrant blur() below must not re-commit
        txt.contentEditable='false';txt.blur();
        // Persist to localStorage immediately (synchronous) so closing the
        // detailed view — which reparents & reloads this iframe — can't drop
        // the edit while the async car-number check is still in flight.
        saveBandStateLS();
        if(baseKey==='xxxx'){finalizeCarNumber(txt,bandKey,()=>syncBand(bandKey));}
        else{syncBand(bandKey);}
      };
      cellItem.addEventListener('click',()=>{
        if(txt.isContentEditable){commit();return;}
        txt.contentEditable='true';txt.focus();
        const sel=window.getSelection(),rng=document.createRange();rng.selectNodeContents(txt);rng.collapse(false);sel.removeAllRanges();sel.addRange(rng);
      });
      txt.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();commit();}});
      // Commit when focus leaves the cell (clicking elsewhere, closing the
      // detailed view, etc.) — previously only Enter or a second click saved.
      txt.addEventListener('blur',commit);
    }else if(BOARD_BANDS_EDITABLE&&!BAND_HL_EXCLUDE.has(baseKey)){
      cellItem.style.cursor='pointer';
      const grp=BAND_HL_GROUPS.find(g=>g.indexOf(baseKey)>=0);
      const setHl=(el,on)=>{el.dataset.hl=on?'1':'0';el.style.background=on?'rgba(30,143,58,0.1)':'#fff';};
      cellItem.addEventListener('click',()=>{
        const on=cellItem.dataset.hl==='1';
        if(on){setHl(cellItem,false);}
        else{
          // activating: clear the other members of this cell's group in this band
          if(grp)grp.forEach(k=>{if(k!==baseKey){const sib=document.querySelector('[data-key="'+k+'-band-'+bandKey+'"]');if(sib)setHl(sib,false);}});
          setHl(cellItem,true);
        }
        syncBand(bandKey);
      });
    }
  });
}
const BAND_HL_EXCLUDE=new Set(['km','cycle','xxxx','n1234','n12']);
const BAND_EDITABLE=new Set(['xxxx','n1234','n12']);
const BAND_HL_GROUPS=[['vl','vr','hl','hr'],['hot','cold'],['wet','dry'],['new','used']];
// TRACK + PIT board bands are read-only display; editing lives in STOCK instead.
const BOARD_BANDS_EDITABLE=false;

/* ---- board bands (4 TRACK corners + 4 PIT). Their highlight/number state is
   part of the per-car tyre blob (see stint9_tyre_state below). ---- */
const BAND_KEYS=['tl','tr','bl','br','v1','v2','v3','v4'];
const BAND_HL_CELLS=['vl','vr','hl','hr','dry','new','cold','wet','used','hot'];
const BAND_TXT_CELLS=['xxxx','n1234','n12'];
const SB_URL='https://esvvzgxqnfszhttdkuzc.supabase.co',SB_KEY='sb_publishable_svmP7ATfuf9eK-jJGXjlYQ_qC8nONLU';
function readBandState(band){
  const active=BAND_HL_CELLS.filter(k=>{const e=document.querySelector('[data-key="'+k+'-band-'+band+'"]');return e&&e.dataset.hl==='1';});
  const texts={};BAND_TXT_CELLS.forEach(k=>{const e=document.querySelector('[data-key="'+k+'-band-'+band+'"] .txt');if(e)texts[k]=e.textContent;});
  return {active,texts};
}
// localStorage helpers removed — per-car DB blob is the source of truth.

/* ---- 1234 = car number: zero-pad to 4 digits and reject duplicates. On
   commit, gather the numbers already used by the other bands (both live in
   the DOM and persisted in the DB); if this number is taken, warn and bump to
   the next free number. ---- */
const pad4=n=>String(n).padStart(4,'0');
function finalizeCarNumber(txt, band, done){
  const digits=(txt.textContent||'').replace(/\D/g,'');
  if(digits===''){done();return;}          // empty is allowed (clears the number)
  const n=parseInt(digits,10);
  const domUsed=new Set();
  BAND_KEYS.forEach(b=>{if(b===band)return;const e=document.querySelector('[data-key="xxxx-band-'+b+'"] .txt');if(e){const d=(e.textContent||'').replace(/\D/g,'');if(d!=='')domUsed.add(pad4(parseInt(d,10)));}});
  const resolve=(used)=>{
    let cand=pad4(n);
    if(used.has(cand)){let m=n;while(used.has(pad4(m)))m++;const next=pad4(m);
      alert('Number '+cand+' already in use.\nNext available: '+next);cand=next;}
    txt.textContent=cand;done();
  };
  // The DOM holds this car's full board, so dedup against it directly.
  resolve(domUsed);
}

/* Shared transfer animation. `clones` are already in `overlay` at their start
   positions (with NO transition set). They gather into a neat vertical stack at
   (gatherX, gatherY + i*step), then leave one-by-one — sliding to exitX while
   shrinking and fading toward the destination side.
   • opts.onLeave fires once, as the stack starts leaving → do the state commit +
     repack there so it happens under the departing clones (no dead pause).
   • opts.onExit fires after the last clone is gone → release busy flags.
   Completion is driven by transitionend (with a timeout fallback), so nothing
   depends on hand-tuned frame counts. */
function gatherAndExit(overlay,clones,opts){
  const EASE='cubic-bezier(.55,.06,.2,1)',GATHER=520,EXIT=520,
        stag=(opts.stagger!=null?opts.stagger:90),step=(opts.step!=null?opts.step:140),shrink=opts.shrink!==false;
  clones.forEach(c=>{c.style.transition='left '+GATHER+'ms '+EASE+',top '+GATHER+'ms '+EASE;});
  requestAnimationFrame(()=>requestAnimationFrame(()=>{clones.forEach((c,i)=>{c.style.left=opts.gatherX+'px';c.style.top=(opts.gatherY+i*step)+'px';});}));
  setTimeout(()=>{
    if(opts.onLeave)opts.onLeave();
    let gone=0;const finish=()=>{if(++gone>=clones.length){overlay.remove();if(opts.onExit)opts.onExit();}};
    clones.forEach((c,i)=>setTimeout(()=>{
      c.style.transition='left '+EXIT+'ms '+EASE+',transform '+EXIT+'ms '+EASE+',opacity '+EXIT+'ms '+EASE;
      c.style.left=opts.exitX+'px';if(shrink)c.style.transform='translate(-50%,-50%) scale(.35)';c.style.opacity='0';
      let done=false;const end=()=>{if(done)return;done=true;finish();};
      c.addEventListener('transitionend',ev=>{if(ev.propertyName==='left')end();},{once:true});
      setTimeout(end,EXIT+140);   // fallback if transitionend never fires
    },i*stag));
  },GATHER+60);
}
/* ▸ send: the 4 selected bands slide left off the panel (staggered, fade + slight
   shrink); PIT is filled (HOT) and STOCK repacks once they've left. */
function sendSelectedToPit(){

  const items=stockSel.slice(0,4).map((b,i)=>({band:b,key:b.dataset.stockkey,tyre:tyreFromStockBand(b,SEL_POS[i])}));
  // commit the state now (PIT gets the tyres); the clones animate away on top
  const slots=['v1','v2','v3','v4'];
  items.forEach((it,i)=>setBoardBandFromTyre(slots[i],Object.assign({},it.tyre,{temp:'hot'})));   // fill PIT (tyre warmers -> HOT)
  items.forEach(it=>{if(it.key)STOCK_REMOVED.add(it.key);});saveStockRemoved();
  stockSel=[];
  const overlay=el('div');overlay.style.cssText='position:fixed;inset:0;z-index:9999;pointer-events:none';document.body.appendChild(overlay);
  const EASE='cubic-bezier(.5,.05,.2,1)';
  const clones=items.map(it=>{const r=it.band.getBoundingClientRect();const c=pBand(it.tyre);
    c.style.cssText='position:absolute;left:'+r.left+'px;top:'+r.top+'px;box-shadow:0 6px 20px rgba(0,0,0,.28)';
    overlay.appendChild(c);
    const ph=document.createElement('div');ph.className='pband placeholder';it.band.replaceWith(ph);   // reveal the placeholder grid underneath as the band lifts off
    return {c,w:r.width};});

    c.style.transition='left .5s '+EASE+',opacity .5s ease,transform .5s '+EASE;
    c.style.left=(-w-60)+'px';c.style.opacity='0';c.style.transform='scale(.85)';   // slide fully off the left edge
    let done=false;const end=()=>{if(done)return;done=true;finish();};
    c.addEventListener('transitionend',ev=>{if(ev.propertyName==='left')end();},{once:true});
    setTimeout(end,700);   // fallback if transitionend never fires

function pBand(t,editKey){
  t=t||{};const b=document.createElement('div');b.className='pband';
  const grid=[
    {k:'vl',l:'VL',t:'pos'},{k:'vr',l:'VR',t:'pos'},{k:'hl',l:'HL',t:'pos'},{k:'hr',l:'HR',t:'pos'},{k:'id',v:(t.id||'----'),t:'ed',f:'id'},
    {k:'dry',l:'DRY',t:'ico',hl:1},{k:'new',l:'NEW',t:'ico',hl:1},{k:'cold',l:'COLD',t:'ico',hl:1},{k:'km',l:'KM',t:'ico'},{k:'km#',v:(t.km!=null?t.km:'—'),t:'ed',f:'km'},
    {k:'wet',l:'WET',t:'ico',hl:1},{k:'used',l:'USED',t:'ico',hl:1},{k:'hot',l:'HOT',t:'ico',hl:1},{k:'cycle',l:'CYCLE',t:'ico'},{k:'cyc#',v:(t.cycle!=null?t.cycle:'—'),t:'ed',f:'cycle'}
  ];
  // STOCK tyres are always COLD (like STINT): force cold regardless of stored temp
  const temp=editKey?'cold':t.temp;
  const active=new Set([t.pos,t.cond,t.wear,temp].filter(Boolean));
  grid.forEach(g=>{
    const c=document.createElement('div');c.className='pcell';c.dataset.k=g.k;
    const isHl=(g.t==='pos'||g.hl);
    if(isHl&&active.has(g.k))c.classList.add('hl');
    if(g.t==='pos')c.innerHTML='<div class="pt">'+g.l+'</div>';
    else if(g.t==='ico')c.innerHTML=ICONS[g.k]+'<div class="plbl">'+g.l+'</div>';
    else c.innerHTML='<div class="'+(g.k==='id'?'pid':'pn')+'">'+g.v+'</div>';
    if(editKey)wireStockCell(c,g,b,editKey);

    const sel=document.createElement('div');sel.className='bandsel';sel.title='select (max 4)';sel.innerHTML=SELECT_ICON;
    sel.addEventListener('click',e=>{e.stopPropagation();toggleBandSelect(b);});
    b.appendChild(sel);

function wireStockCell(c,g,band,editKey){
  const isHl=(g.t==='pos'||g.hl);
  if(isHl&&STOCK_AXIS[g.k]==='temp')return;   // temp is locked to COLD in STOCK: not editable
  if(isHl){
    const axis=STOCK_AXIS[g.k];c.style.cursor='pointer';
    c.addEventListener('click',()=>{
      const on=c.classList.contains('hl');
      band.querySelectorAll('.pcell.hl').forEach(sib=>{if(STOCK_AXIS[sib.dataset.k]===axis)sib.classList.remove('hl');});
      const st=STOCK_STATE[editKey]||(STOCK_STATE[editKey]={});
      if(on){st[axis]=null;}else{c.classList.add('hl');st[axis]=g.k;}
      saveStock();
    });
  }else if(g.t==='ed'){
    const txt=c.querySelector('.pid,.pn');const field=g.f||'id';c.style.cursor='text';
    const commit=()=>{if(!txt.isContentEditable)return;txt.contentEditable='false';
      // serial (id) must be globally unique: if it's already in use, warn and
      // bump to the next free number (auto-applied when the popup is dismissed).
      if(field==='id'){
        const digits=(txt.textContent||'').replace(/\D/g,'');
        if(digits!==''){
          const used=allUsedSerials(editKey);let cand=pad4(parseInt(digits,10));
          if(used.has(cand)){let n=parseInt(digits,10);while(used.has(pad4(n)))n++;const next=pad4(n);
            alert('Number '+cand+' already in use.\nNext available: '+next);cand=next;}
          txt.textContent=cand;
        }
      }
      const st=STOCK_STATE[editKey]||(STOCK_STATE[editKey]={});st[field]=txt.textContent.trim();saveStock();};
    c.addEventListener('click',()=>{if(txt.isContentEditable){commit();return;}txt.contentEditable='true';txt.focus();const sel=window.getSelection(),r=document.createRange();r.selectNodeContents(txt);r.collapse(false);sel.removeAllRanges();sel.addRange(r);});
    txt.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();commit();}});
    txt.addEventListener('blur',commit);
  }
}

let STINT_REMOVED=new Set();

const sigOf=tyres=>(tyres||[]).map(t=>t&&t.id).join(',');
/* STINT_SETS with any sample set that was moved to STOCK turned into an empty slot */
function effectiveStintSets(){return STINT_SETS.map(s=>(!s.placeholder&&STINT_REMOVED.has(sigOf(s.tyres)))?{label:s.label,placeholder:true,tyres:[0,0,0,0]}:s);}
/* every tyre serial currently on the STINT board (fixed sets + transfers) */
function stintSerialsInUse(){const seen=new Set();
  effectiveStintSets().forEach(s=>{if(!s.placeholder)(s.tyres||[]).forEach(t=>{if(t&&t.id)seen.add(t.id);});});
  STINT_XFERS.forEach(ts=>(ts||[]).forEach(t=>{if(t&&t.id)seen.add(t.id);}));
  return seen;}
function stintSetsWithXfers(){
  // A band serial can only exist in one rectangle: reserve the fixed sets'
  // serials, then drop any transfer that reuses an already-seen serial.
  const base=effectiveStintSets();
  const seen=new Set();
  base.forEach(s=>{if(!s.placeholder)(s.tyres||[]).forEach(t=>{if(t&&t.id)seen.add(t.id);});});
  const clean=[];
  STINT_XFERS.forEach(tyres=>{const ids=(tyres||[]).map(t=>t&&t.id).filter(Boolean);
    if(ids.some(id=>seen.has(id)))return;      // duplicate serial → skip (no doubles)
    ids.forEach(id=>seen.add(id));clean.push(tyres);});
  if(clean.length!==STINT_XFERS.length){STINT_XFERS=clean;saveXfers();}
  let xi=0;
  const out=base.map(s=>(s.placeholder&&xi<clean.length)?{label:s.label,tyres:clean[xi++]}:s);
  // overflow: transfers beyond the 5 fixed columns get their own columns (the
  // STINT reel scrolls) so nothing is lost when more than 4 sets are transferred.
  let n=out.length;
  while(xi<clean.length){const ts=clean[xi++];out.push({label:'Stint '+(++n)+' · '+((ts[0]&&ts[0].id)||'----'),tyres:ts});}
  return out;
}
/* STOCK sets = fixed A-E, then sets retired from STINT, then the empty placeholder(s) */
function stockSetsAll(){const fixed=STOCK_SETS.filter(s=>!s.placeholder),ph=STOCK_SETS.filter(s=>s.placeholder);return [...fixed,...STOCK_ADDS,...ph];}

/* STOCK display columns: a FIXED 6-column grid of placeholder rectangles that acts
   like a permanent background — rectangles are NEVER removed. Surviving bands are
   packed into the top-left slots (column by column); every other slot stays a
   placeholder. Sending a band to PIT just turns its slot into a placeholder (the
   rectangle stays). Each band keeps its stable edit-key (bk) so highlights/edits/
   selection follow the tyre, not the slot. */
const STOCK_COLS=6, STOCK_ROWS=4;
function stockDisplayColumns(){
  const sets=stockSetsAll();
  const bands=[];
  sets.forEach((s,setIdx)=>{if(s.placeholder)return;
    s.tyres.forEach((t,ti)=>{const bk='stock-'+setIdx+'-'+ti;
      if(STOCK_REMOVED.has(bk))return;               // sent to PIT: its slot stays a placeholder
      bands.push({tyre:stockMerge(t,bk),bk});});});
  STOCK_NEW.forEach((t,i)=>{const bk='stocknew-'+i;   // individually-added new tyres
    if(STOCK_REMOVED.has(bk))return;
    bands.push({tyre:stockMerge(t,bk),bk});});
  const cols=[];
  for(let c=0;c<STOCK_COLS;c++){const chunk=[];
    for(let r=0;r<STOCK_ROWS;r++)chunk.push(bands[c*STOCK_ROWS+r]||null);   // survivors packed front, rest = permanent placeholders
    cols.push(chunk);}
  // mark the left-most, top-most free placeholder (the next packing slot) with the "add new tyre" plus
  for(let c=0,done=false;c<STOCK_COLS&&!done;c++)
    for(let r=0;r<STOCK_ROWS;r++){if(cols[c][r]===null){cols[c][r]={plus:true};done=true;break;}}
  return cols;
}

const CORNER_XY={tl:[336,225.6],tr:[694,225.6],bl:[336,494.4],br:[694,494.4]};
const PIT_XY={v1:[1008,158.4],v2:[1008,292.8],v3:[1008,427.2],v4:[1008,561.6]};

let EMPTY_BANDS=new Set();

const _trackKm={};   // live accumulated KM per TRACK band (reset when a band is (un)mounted)
function setBandEmpty(band,empty){if(empty)EMPTY_BANDS.add(band);else EMPTY_BANDS.delete(band);delete _trackKm[band];setBandCellsVisible(band,!empty);saveEmpty();try{updateBandCross(band);}catch(e){}}

/* copy one board band's state (highlights + serial/km/cycle) onto another + persist */
function copyBandState(from,to){const bs=readBandState(from);try{applyBandState({[to]:bs});}catch(e){}try{syncBand(to);}catch(e){}delete _trackKm[to];}
/* live KM: the parent posts the selected car's progress; while tyres are on
   TRACK their KM ticks up by (Δprogress × km-per-sector). The accumulated KM is
   in the DOM, so it travels with the band when it's later pushed to STINT. */
let _liveProg=null,_tkPersist=0,_seenPit,_pendingPit=null,_remindedPit=null,_curSec=null;
// NLS 5-sector lengths in km (unequal: S4 is by far the longest), total 24.358.
const _SEC_KM=[3.3,3.3,6.0,9.4,2.4];
function _boardKmEl(band){return document.querySelector('[data-key="n1234-band-'+band+'"] .txt');}
/* prog p = lap*5 + sector-progress (each sector = 1 unit). Convert to km using
   the per-sector lengths (time-fraction within a sector × that sector's km). */
function _kmAt(p,sk){const total=sk.reduce((a,b)=>a+b,0);const lap=Math.floor(p/5);const pos=p-lap*5;
  const si=Math.max(0,Math.min(4,Math.floor(pos))),frac=pos-si;let cum=0;for(let i=0;i<si;i++)cum+=sk[i];
  return lap*total+cum+frac*sk[si];}
function onTyreLive(prog,sectorKm,lap,sec,pit){
  const sk=(sectorKm&&sectorKm.length===5)?sectorKm:_SEC_KM;
  // --- KM logging: add the km driven since the last sample to each TRACK band ---
  if(prog!=null){
    if(_liveProg!=null&&prog>_liveProg&&!isTrackEmpty()){
      const dKm=_kmAt(prog,sk)-_kmAt(_liveProg,sk);
      if(dKm>0){TRACK_BANDS.forEach(b=>{if(EMPTY_BANDS.has(b))return;const e=_boardKmEl(b);if(!e)return;
        if(_trackKm[b]==null)_trackKm[b]=parseInt((e.textContent||'').replace(/\D/g,''),10)||0;
        _trackKm[b]+=dKm;e.textContent=String(Math.round(_trackKm[b]));updateBandCross(b);});
        const now=Date.now();if(now-_tkPersist>5000){_tkPersist=now;TRACK_BANDS.forEach(b=>{if(!EMPTY_BANDS.has(b))try{syncBand(b);}catch(e){}});}}
    }
    _liveProg=prog;
  }else _liveProg=null;
  // --- pit reminder: arm on a new pit; if the car reaches S2 of the out-lap and
  // the TRACK->STINT transfer still wasn't done (user didn't push the button),
  // pop a one-off "update tyres" reminder. ---
  if(pit!=null){
    if(_seenPit===undefined)_seenPit=pit;                 // ignore pits already past at load
    else if(pit>_seenPit){_seenPit=pit;_pendingPit=pit;_remindedPit=null;}
  }
  if(_pendingPit!=null&&lap!=null&&(lap>_pendingPit+1||(lap===_pendingPit+1&&sec>=2))&&_remindedPit!==_pendingPit){
    _remindedPit=_pendingPit;alert('update tyres');
  }
  // current sector drives the mount button state (only mountable in S1)
  if(sec!=null&&sec!==_curSec){
    const enteringS3=(sec===3&&_curSec!=null&&_curSec!==3);
    _curSec=sec;
    if(typeof refreshBtns==='function')refreshBtns();
    // entering S3 with an empty PIT -> remind to get the next set ready
    if(enteringS3&&isPitEmpty())alert('prepare next tyre set');

}
/* every serial currently in use across TRACK, PIT, STINT and STOCK (visible
   bands only), optionally excluding one STOCK band key being edited. */
function allUsedSerials(excludeStockKey){
  const used=new Set(),add=v=>{const d=String(v==null?'':v).replace(/\D/g,'');if(d!=='')used.add(pad4(parseInt(d,10)));};
  [...TRACK_BANDS,...PIT_BANDS].forEach(b=>{if(EMPTY_BANDS.has(b))return;add((readBandState(b).texts||{}).xxxx);});
  stintSetsWithXfers().forEach(s=>{if(!s.placeholder)(s.tyres||[]).forEach(t=>add(t&&t.id));});
  stockSetsAll().forEach((s,si)=>{if(s.placeholder)return;(s.tyres||[]).forEach((t,ti)=>{const bk='stock-'+si+'-'+ti;if(bk===excludeStockKey||STOCK_REMOVED.has(bk))return;add(stockMerge(t,bk).id);});});
  STOCK_NEW.forEach((t,i)=>{const bk='stocknew-'+i;if(bk===excludeStockKey||STOCK_REMOVED.has(bk))return;add(stockMerge(t,bk).id);});
  return used;
}

    onExit:()=>{animBusy=false;}});
}
EMPTY_BANDS.forEach(b=>setBandCellsVisible(b,false));   // restore hidden bands on load
refreshBtns();
refreshAllBandCrosses();   // reflect over-max-KM crosses from the loaded band state

/* animate a set of band moves (compact clones fly from -> to, one by one) */
function animateSeq(moves,done){
  if(!moves.length){if(done)done();return;}
  const overlay=el('div');overlay.style.cssText='position:fixed;inset:0;z-index:9999;pointer-events:none';document.body.appendChild(overlay);
  const EASE='cubic-bezier(.55,.06,.2,1)';let landed=0;
  moves.forEach((m,i)=>{
    const c=pBand(m.tyre);
    c.style.cssText='position:absolute;left:'+m.from[0]+'px;top:'+m.from[1]+'px;transform:translate(-50%,-50%);opacity:0;'+
      'transition:left .55s '+EASE+',top .55s '+EASE+',opacity .3s;box-shadow:0 6px 20px rgba(0,0,0,.28)';
    overlay.appendChild(c);
    setTimeout(()=>{
      c.style.opacity='1';
      requestAnimationFrame(()=>requestAnimationFrame(()=>{c.style.left=m.to[0]+'px';c.style.top=m.to[1]+'px';}));
      setTimeout(()=>{if(m.land)m.land();c.style.opacity='0';if(++landed===moves.length){setTimeout(()=>{overlay.remove();if(done)done();},260);}},600);
    },i*230);
  });
}
/* ◀ mount: move each PIT band to its TRACK corner (VL→tl, VR→tr, HL→bl, HR→br) */
function mountPitToTrack(){
  if(animBusy||isPitEmpty()||!isTrackEmpty())return;
  animBusy=true;const moves=[];
  PIT_BANDS.forEach(v=>{if(EMPTY_BANDS.has(v))return;const corner=CORNER_OF[posOf(readBandState(v))];if(!corner)return;
    moves.push({tyre:captureTyreRaw(v),from:PIT_XY[v],to:CORNER_XY[corner],land:()=>{copyBandState(v,corner);setBandEmpty(corner,false);setBandEmpty(v,true);}});});
  animateSeq(moves,()=>{animBusy=false;refreshBtns();});
}
/* ▶ unmount: move each TRACK corner back to PIT (VL top, VR 2nd, HL 3rd, HR bottom) */
function unmountTrackToPit(){
  if(animBusy||isTrackEmpty()||!isPitEmpty())return;
  animBusy=true;const moves=[];
  TRACK_BANDS.forEach(c=>{if(EMPTY_BANDS.has(c))return;const slot=PIT_OF[posOf(readBandState(c))];if(!slot)return;
    moves.push({tyre:captureTyreRaw(c),from:CORNER_XY[c],to:PIT_XY[slot],land:()=>{copyBandState(c,slot);setBandEmpty(slot,false);setBandEmpty(c,true);}});});
  animateSeq(moves,()=>{animBusy=false;refreshBtns();});
}
function doTransfer(){
  if(xferBusy||isTrackEmpty())return;
  _pendingPit=null;   // user did the TRACK->STINT transfer -> clear the pit reminder
  const raw=TRACK_BANDS.map(captureTyreRaw);
  // no duplicate serials on the STINT board: warn + cancel instead of silently
  // dropping the set (which would leave those tyres nowhere). No slot cap — extra
  // sets get their own columns via stintSetsWithXfers().
  const inUse=stintSerialsInUse(),dup=raw.map(t=>t&&t.id).filter(id=>id&&inUse.has(id));
  if(dup.length){alert('Cannot transfer to STINT — tyre '+dup.join(', ')+' is already on the STINT board (no duplicate serials).');return;}
  xferBusy=true;xferBtn.classList.add('busy');
  const overlay=el('div');overlay.style.cssText='position:fixed;inset:0;z-index:9999;pointer-events:none';document.body.appendChild(overlay);
  const clones=raw.map((t,i)=>{const c=pBand(t);const xy=CORNER_XY[TRACK_BANDS[i]];
    c.style.cssText='position:absolute;left:'+xy[0]+'px;top:'+xy[1]+'px;transform:translate(-50%,-50%);box-shadow:0 6px 20px rgba(0,0,0,.25)';overlay.appendChild(c);return c;});
  TRACK_BANDS.forEach(b=>setBandCellsVisible(b,false));
  gatherAndExit(overlay,clones,{gatherX:430,gatherY:112,step:140,exitX:-260,   // sweep left toward STINT
    onLeave:()=>{
      STINT_XFERS.push(raw.map(tyreTransfer));saveXfers();rebuildStintPanel();updateStintBadge();
      TRACK_BANDS.forEach(b=>setBandEmpty(b,true));
      refreshBtns();
    },
    onExit:()=>{xferBusy=false;refreshBtns();}});
}
/* red badge on the STINT button = number of sets currently in STINT (filled
   columns), like an unread-SMS count on an iPhone app icon. */
function updateStintBadge(){
  const n=stintSetsWithXfers().filter(s=>!s.placeholder).length;
  let b=document.getElementById('stintBadge');
  if(!b){b=el('span');b.id='stintBadge';stintEl.appendChild(b);}
  b.textContent=n;b.style.display=n>0?'flex':'none';
}
updateStintBadge();
/* same red badge on the STOCK button = how many tyre-bands are actually shown in
   STOCK. STOCK renders individual bands (packed into the grid, PIT-sent bands
   dropped), so the badge must count those rendered rectangles — not raw sets,
   which would ignore STOCK_REMOVED and mix up the units (1 set = 4 bands). */
function updateStockBadge(){
  const n=stockDisplayColumns().reduce((a,col)=>a+col.filter(e=>e&&!e.plus).length,0);
  let b=document.getElementById('stockBadge');
  if(!b){b=el('span');b.id='stockBadge';stockEl.appendChild(b);}
  b.textContent=n;b.style.display=n>0?'flex':'none';
}
updateStockBadge();

/* retire a STINT set to STOCK: password-gated (password 'x'), then the whole
   column animates down off the page and the set is added to STOCK. */
function retireStintSet(col,s){
  const pw=window.prompt('Password to move this set to STOCK:');
  if(pw!=='x')return;                       // wrong password or cancelled → do nothing
  col.style.transition='transform .6s cubic-bezier(.55,.06,.2,1),opacity .6s';
  col.style.transform='translateY(760px)';col.style.opacity='0';
  setTimeout(()=>moveStintSetToStock(s),640);
}
function moveStintSetToStock(s){
  const sig=sigOf(s.tyres);
  const xi=STINT_XFERS.findIndex(ts=>sigOf(ts)===sig);
  if(xi>=0){STINT_XFERS.splice(xi,1);saveXfers();}   // remove a transferred set
  else{STINT_REMOVED.add(sig);saveRemoved();}         // or retire a fixed/sample set
  STOCK_ADDS.push({label:'Set · '+((s.tyres[0]&&s.tyres[0].id)||'----'),tyres:s.tyres});saveStockAdds();
  rebuildStintPanel();rebuildStockPanel();updateStintBadge();updateStockBadge();
}
