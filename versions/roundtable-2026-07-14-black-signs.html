<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Roundtable</title>
<style>
  :root{
    --bg:#787878; --panel:#383838; --panel2:#383838; --line:#4a4a4a;
    --txt:#e7eaef; --muted:#8a929e; --stamp:#9aa2ad;
    --white:#f4f6f9; --gray:#8b929c; --red:#e2453a;
    --send:#2f6df6;
  }
  *{box-sizing:border-box}
  body{
    margin:0; color:var(--txt);
    /* studio cove sampled from roundtable.png: dark top → bright horizon band → mid-grey floor */
    background:var(--bg);
    background:linear-gradient(180deg,#3d3d3d 0%,#676767 15%,#9e9e9e 38%,#8f8f8f 55%,#878787 80%,#787878 100%);
    background-attachment:fixed;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  header{padding:22px 18px 6px; text-align:center}
  header h1{margin:0; font-size:24px; letter-spacing:.5px; font-weight:700}
  header p{margin:6px 0 0; color:var(--muted); font-size:13px}

  /* ---------- Stage: 2 columns | roundtable | 2 columns ---------- */
  .stage{
    display:flex; gap:12px; align-items:stretch; justify-content:center;
    flex-wrap:wrap; padding:24px 14px 40px; max-width:1720px; margin:0 auto;
  }
  .side{display:flex; gap:12px; flex:1 1 400px; min-width:0}
  .side .col{flex:1 1 0; min-width:0}
  .diagram-wrap{flex:0 0 480px; display:flex; justify-content:center; align-items:flex-start}
  .diagram{position:relative; width:100%; max-width:480px; aspect-ratio:560/520}
  @media(max-width:1240px){
    .stage{flex-direction:column; align-items:center}
    .diagram-wrap{order:-1; flex:0 0 auto}
    .side{flex:1 1 100%; width:100%; max-width:920px}
  }
  @media(max-width:600px){ .side{flex-direction:column} }
  .table-img{
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    width:92%; z-index:0; opacity:.92;
  }
  /* subtle engraved name tags on the table — who sits where */
  .tag{
    position:absolute; z-index:2; transform:translate(-50%,-50%);
    background:linear-gradient(180deg, rgba(38,38,38,.92), rgba(20,20,20,.94));
    border:1px solid rgba(160,160,160,.28);
    color:#ececec; padding:3px 10px; border-radius:4px;
    font-size:11px; font-weight:600; letter-spacing:.7px; text-align:center; white-space:nowrap;
    box-shadow:0 2px 6px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.06);
  }
  .tag small{display:block; font-size:8px; font-weight:400; letter-spacing:.3px; color:#b0b0b0; margin-top:1px}
  #nAI2{top:27%; left:50%}
  #nAI1{top:50%; left:50%}
  #nH1{top:38.5%; left:31%; transform:translate(0,-50%)}       /* half sign width inwards (right) */
  #nH2{top:38.5%; left:69%; transform:translate(-100%,-50%)}   /* half sign width inwards (left) */

  /* ---------- Channels ---------- */

  .col{
    background:var(--panel); border:1px solid var(--line); border-radius:12px;
    display:flex; flex-direction:column; overflow:hidden; min-height:380px;
  }
  .col-head{
    padding:11px 12px; cursor:pointer; user-select:none;
    display:flex; align-items:center; gap:8px;
    border-bottom:1px solid var(--line); position:relative;
  }
  .col-head .accent{width:10px; height:10px; border-radius:50%; flex:none}
  .col-head .title{font-weight:700; font-size:14px}
  .col-head .sub{font-size:11px; color:var(--muted); margin-top:1px}
  .col-head .hbadge{
    margin-left:auto; background:var(--red); color:#fff; font-size:11px; font-weight:700;
    min-width:20px; height:20px; padding:0 5px; border-radius:11px;
    display:none; align-items:center; justify-content:center;
  }
  .col-head .hbadge.on{display:inline-flex}

  .thread{
    order:2;
    flex:1; overflow-y:auto; padding:12px; display:flex; flex-direction:column;
    gap:9px; background:var(--panel2); min-height:120px;
  }
  .thread .empty{color:var(--muted); font-size:12px; text-align:center; margin:auto 0}
  .msg{max-width:88%; padding:8px 10px; border-radius:10px; font-size:13px; line-height:1.35; word-wrap:break-word}
  .msg.sent{align-self:flex-end; background:#26497f; border:1px solid #34599a}
  .msg.recv{align-self:flex-start; background:#474747; border:1px solid #565656}
  .msg .stamp{display:block; margin-top:4px; font-size:10px; color:var(--stamp); font-weight:400}
  .msg.unread{box-shadow:0 0 0 1px var(--red) inset}

  .composer{order:1; padding:10px; border-bottom:1px solid var(--line); background:var(--panel)}
  .ai-note{font-size:10.5px; color:var(--muted); margin:0 0 6px; display:flex; align-items:center; gap:5px}
  .ai-note b{color:#c69ac0}
  textarea{
    width:100%; resize:vertical; min-height:46px; max-height:140px;
    background:#2b2b2b; color:var(--txt); border:1px solid var(--line);
    border-radius:8px; padding:8px 9px; font:inherit; font-size:13px;
  }
  textarea:focus{outline:none; border-color:#6a6a6a}
  .btnrow{display:flex; gap:7px; margin-top:7px}
  button{font:inherit; border:none; border-radius:8px; cursor:pointer; font-weight:600; font-size:12.5px; padding:8px 12px}
  .btn-draft{background:#000000; color:#d7d7d7; border:1px solid #4a4a4a}
  .btn-draft:hover{background:#161616}
  .btn-send{background:var(--red); color:#fff; margin-left:auto}
  .btn-send:hover{background:#f05a4f}
  .btn-send:disabled{background:#4a4a4a; color:#8a8a8a; cursor:not-allowed}
</style>
</head>
<body>
<header>
  <h1>AI Roundtable</h1>
  <p>4-way collaboration &mdash; two humans and their AIs working one project simultaneously</p>
</header>

<div class="stage">
  <div class="side" id="channels-left"></div>

  <div class="diagram-wrap">
    <div class="diagram">
      <img class="table-img" src="roundtable.png" alt="Roundtable">
      <div class="tag" id="nAI2">AI 2<small>AI of Human 2</small></div>
      <div class="tag" id="nH1">Human 1</div>
      <div class="tag" id="nH2">Human 2</div>
      <div class="tag" id="nAI1">AI 1<small>AI of Human 1</small></div>
    </div>
  </div>

  <div class="side" id="channels-right"></div>
</div>

<script>
// --- Supabase (separate table from the stint9_* dashboard stream) ---
const SB  = 'https://esvvzgxqnfszhttdkuzc.supabase.co';
const KEY = 'sb_publishable_svmP7ATfuf9eK-jJGXjlYQ_qC8nONLU';
const H   = {apikey:KEY, Authorization:'Bearer '+KEY};
const TABLE = '/rest/v1/roundtable_messages';

const CHANNELS = [
  {id:'h1h2',  title:'H1 → H2',   sub:'Human 1 asks Human 2',  color:'var(--white)', from:'H1', side:'left'},
  {id:'h1ai2', title:'H1 → AI2',  sub:'Human 1 asks AI of H2', color:'var(--gray)',  from:'H1', ai:'AI2', side:'left'},
  {id:'h2h1',  title:'H2 → H1',   sub:'Human 2 asks Human 1',  color:'var(--white)', from:'H2', side:'right'},
  {id:'h2ai1', title:'H2 → AI1',  sub:'Human 2 asks AI of H1', color:'var(--gray)',  from:'H2', ai:'AI1', side:'right'},
];

// Message stream lives in Supabase. Only a tiny per-device "read cursor"
// (highest message id seen per channel) is kept locally — not the messages.
const RKEY = 'roundtable_read_v1';
let cursor = JSON.parse(localStorage.getItem(RKEY) || '{}');
CHANNELS.forEach(c=>{ if(cursor[c.id]==null) cursor[c.id]=0; });
function saveCursor(){ localStorage.setItem(RKEY, JSON.stringify(cursor)); }

let byChannel = {}; CHANNELS.forEach(c=> byChannel[c.id]=[]);

const AI_DRAFTS = [
  "Proposing we align on the sector split before the next stint. Confirm?",
  "Draft: shared model updated. Requesting human sign-off before broadcast.",
  "Suggest we reconcile our two estimates — mine reads 3% higher.",
];
let di=0;

function stamp(ts){
  const d = new Date(ts);
  return d.toLocaleDateString([], {day:'2-digit',month:'short'}) + ' ' +
         d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
}
function escapeHtml(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function maxId(id){ const a=byChannel[id]; return a.length? a[a.length-1].id : 0; }
function unreadFor(id){ const cur=cursor[id]||0; return byChannel[id].filter(m=>m.id>cur).length; }

async function load(){
  try{
    const r = await fetch(SB+TABLE+'?select=id,channel,sender,body,via_ai,created_at&order=created_at.asc',{headers:H});
    const rows = await r.json();
    CHANNELS.forEach(c=> byChannel[c.id]=[]);
    if(Array.isArray(rows)) rows.forEach(m=>{ if(byChannel[m.channel]) byChannel[m.channel].push(m); });
    render();
  }catch(e){ console.error('roundtable load failed', e); }
}

function render(){
  const left = document.getElementById('channels-left');
  const right = document.getElementById('channels-right');
  // preserve in-progress drafts + caret across background re-renders (polling)
  const drafts={}; let focusId=null, caret=0;
  document.querySelectorAll('.side .col').forEach(col=>{
    const ta=col.querySelector('textarea');
    if(ta){ drafts[col.dataset.id]=ta.value;
      if(document.activeElement===ta){ focusId=col.dataset.id; caret=ta.selectionStart; } }
  });
  left.innerHTML = ''; right.innerHTML = '';

  CHANNELS.forEach(c=>{
    const col = document.createElement('div'); col.className='col'; col.dataset.id=c.id;
    const unread = unreadFor(c.id);

    const head = document.createElement('div'); head.className='col-head';
    head.innerHTML =
      `<span class="accent" style="background:${c.color}"></span>`+
      `<div><div class="title">${c.title}</div><div class="sub">${c.sub}</div></div>`+
      `<span class="hbadge ${unread?'on':''}">${unread}</span>`;
    head.onclick = ()=>markRead(c.id);
    col.appendChild(head);

    const thread = document.createElement('div'); thread.className='thread';
    const msgs = byChannel[c.id]; const cur = cursor[c.id]||0;
    if(msgs.length===0){
      thread.innerHTML = '<div class="empty">No messages yet</div>';
    } else {
      msgs.forEach(m=>{
        const mine = m.sender===c.from;
        const el = document.createElement('div');
        el.className = 'msg '+(mine?'sent':'recv')+(m.id>cur?' unread':'');
        const who = m.via_ai ? m.sender+' \u{1F916}' : m.sender;
        el.innerHTML = `<b>${who}:</b> `+escapeHtml(m.body)+`<span class="stamp">${stamp(m.created_at)}</span>`;
        thread.appendChild(el);
      });
    }
    col.appendChild(thread);

    const comp = document.createElement('div'); comp.className='composer';
    if(c.ai){
      comp.innerHTML = `<p class="ai-note">\u{1F916} <b>AI may draft</b> — only a human may press Send.</p>`;
    }
    const ta = document.createElement('textarea');
    ta.placeholder = c.aiCompose ? 'AI draft appears here — human reviews, then sends…' : 'Type a message…';
    if(drafts[c.id]!=null) ta.value = drafts[c.id];
    comp.appendChild(ta);

    const row = document.createElement('div'); row.className='btnrow';
    if(c.ai){
      const draft = document.createElement('button'); draft.className='btn-draft';
      draft.textContent = '\u{1F916} AI draft';
      draft.onclick = ()=>{ ta.value = AI_DRAFTS[di++%AI_DRAFTS.length]; ta.focus(); };
      row.appendChild(draft);
    }
    const send = document.createElement('button'); send.className='btn-send';
    send.textContent = 'Send';
    send.onclick = ()=>{ sendMsg(c, ta.value.trim(), send); };
    row.appendChild(send);
    comp.appendChild(row);

    col.appendChild(comp);
    (c.side==='right' ? right : left).appendChild(col);
    thread.scrollTop = thread.scrollHeight;
  });

  if(focusId){
    const ta = document.querySelector(`.side .col[data-id="${focusId}"] textarea`);
    if(ta){ ta.focus(); try{ ta.setSelectionRange(caret,caret); }catch(_){} }
  }
}

async function sendMsg(c, text, btn){
  if(!text) return;
  btn.disabled = true;
  try{
    await fetch(SB+TABLE, {
      method:'POST',
      headers:{...H,'Content-Type':'application/json',Prefer:'return=minimal'},
      body:JSON.stringify({channel:c.id, sender:c.from, body:text, via_ai:!!c.aiCompose})
    });
    // clear the composer for this channel before reload
    const ta = document.querySelector(`.col[data-id="${c.id}"] textarea`); if(ta) ta.value='';
    await load();
    cursor[c.id] = maxId(c.id); saveCursor();  // author has seen their own message
    render();
  }catch(e){ alert('Send failed — check your connection.'); console.error(e); }
  btn.disabled = false;
}

function markRead(id){
  const top = maxId(id);
  if((cursor[id]||0)!==top){ cursor[id]=top; saveCursor(); render(); }
}

load();
setInterval(load, 4000);  // near-live: refresh every 4s
</script>
</body>
</html>
