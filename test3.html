<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>test3 — STINT / STOCK reels</title>
<style>
  :root{--ink:#16202b;--muted:#6b7480;--line:#16202b;--hl:rgba(30,143,58,0.12)}
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%;background:#fff;font-family:'IBM Plex Mono',ui-monospace,monospace;color:var(--ink)}
  .page{max-width:1600px;margin:0 auto;padding:18px 20px 60px}

  /* ---- top control row: STINT (left) · TRACK (mid) · STOCK (right) ---- */
  .toprow{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}
  .btn{font-size:16px;font-weight:700;letter-spacing:1px;color:var(--ink);background:#c9ccd1;border:2px solid transparent;
    padding:10px 20px;border-radius:9px;cursor:pointer;user-select:none;display:inline-flex;align-items:center;gap:8px;transition:background .15s,border-color .15s}
  .btn:hover{background:#bcc0c6}
  .btn.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .btn.static{cursor:default;background:#e4e6e9}
  .btn.static:hover{background:#e4e6e9}

  /* ---- TRACK cluster: car with the four current tyres around it ---- */
  .track{display:grid;grid-template-columns:auto 132px auto;grid-template-rows:auto auto;gap:14px 22px;
    justify-content:center;align-items:center;padding:6px 0 20px;border-bottom:1px dashed #d3d7dc;margin-bottom:8px}
  .track .car{grid-column:2;grid-row:1 / span 2;display:flex;align-items:center;justify-content:center}
  .track .car img{width:118px;height:auto;display:block}

  /* ---- a single tyre "band": 5 cols x 3 rows grid ---- */
  .band{display:grid;grid-template-columns:repeat(5,34px);grid-template-rows:repeat(3,38px);
    border:2px solid var(--line);border-radius:9px;overflow:hidden;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.08)}
  /* empty parking spot: keep the rectangle, no icons */
  .band.placeholder{display:block;width:170px;height:114px;background:#f7f8fa;box-shadow:none}
  .cell{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;padding:2px;border-radius:0}
  .cell.hl{background:var(--hl)}
  .cell svg{width:24px;height:24px;display:block}
  .cell .lbl{font-size:7px;color:var(--muted);letter-spacing:.4px}
  .cell .txt{font-size:14px;font-weight:700;color:var(--ink)}
  .cell .idtxt{font-size:12px;font-weight:700;color:var(--ink)}
  .cell .numtxt{font-size:13px;font-weight:700;color:var(--ink)}

  /* ---- a "set" = 4 bands stacked vertically (one column, like PIT) ---- */
  .set{display:flex;flex-direction:column;gap:7px;flex:0 0 auto;scroll-snap-align:start}
  .set .setlbl{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);text-align:center;
    background:#f1f3f5;border-radius:6px;padding:4px 6px;font-weight:700}
  .set.stint .setlbl{color:#16202b;background:#e7ecf5}
  .set.stock .setlbl{color:#16202b;background:#e9f2ea}

  /* ---- reel: horizontal scroll of sets ---- */
  .reelsec{display:none;margin-top:12px;border:1px solid #e2e5ea;border-radius:14px;background:#fbfbfc;padding:12px 6px}
  .reelsec.open{display:block}
  .reelhd{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:0 8px 10px}
  .reeltitle{font-size:12px;letter-spacing:2px;text-transform:uppercase;font-weight:700}
  .reeltitle small{display:block;font-size:9px;letter-spacing:1px;color:var(--muted);font-weight:500;margin-top:2px}
  .reelnav{display:flex;gap:6px}
  .navbtn{width:34px;height:34px;border-radius:8px;border:1px solid #cfd4da;background:#fff;color:var(--ink);
    font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0}
  .navbtn:hover{background:#f1f3f5}
  .reel{display:flex;gap:16px;overflow-x:auto;padding:4px 8px 10px;scroll-snap-type:x proximity;scroll-behavior:smooth}
  .reel::-webkit-scrollbar{height:9px}
  .reel::-webkit-scrollbar-thumb{background:#c3c8ce;border-radius:5px}
  .reel::-webkit-scrollbar-track{background:transparent}
  .hint{font-size:10px;color:#aab0b8;text-align:center;padding:2px 0 0}
</style>
</head>
<body>
<div class="page">

  <div class="toprow">
    <button class="btn" id="stintBtn" type="button">&#9664; STINT</button>
    <button class="btn static" type="button">TRACK</button>
    <button class="btn" id="stockBtn" type="button">STOCK &#9654;</button>
  </div>

  <!-- current tyres mounted on the car -->
  <div class="track" id="track">
    <div class="car"><img src="car.png" alt="car"></div>
  </div>

  <!-- STINT reel: used tyre sets, one column (4 bands) per stint -->
  <section class="reelsec" id="stintSec">
    <div class="reelhd">
      <div class="reeltitle">STINT — used sets<small>each column = one set of 4 tyres · scroll for older stints</small></div>
      <div class="reelnav"><button class="navbtn" data-scroll="stintReel" data-dir="-1" type="button">&#9664;</button><button class="navbtn" data-scroll="stintReel" data-dir="1" type="button">&#9654;</button></div>
    </div>
    <div class="reel" id="stintReel"></div>
    <div class="hint">horizontal scroll &#8596; · up to 5 sets in view</div>
  </section>

  <!-- STOCK reel: available sets in stock -->
  <section class="reelsec" id="stockSec">
    <div class="reelhd">
      <div class="reeltitle">STOCK — available sets<small>each column = one set of 4 tyres · scroll for more stock</small></div>
      <div class="reelnav"><button class="navbtn" data-scroll="stockReel" data-dir="-1" type="button">&#9664;</button><button class="navbtn" data-scroll="stockReel" data-dir="1" type="button">&#9654;</button></div>
    </div>
    <div class="reel" id="stockReel"></div>
    <div class="hint">horizontal scroll &#8596;</div>
  </section>

</div>

<script>
/* ---- icons (inline SVG, same set as the TYRE board test2.html) ---- */
const ICONS={
  hot:`<svg viewBox="0 0 64 64"><g stroke="#e0301e" stroke-width="3" fill="none" stroke-linecap="round"><line x1="4" y1="18" x2="16" y2="18"/><line x1="4" y1="26" x2="16" y2="26"/><line x1="4" y1="34" x2="14" y2="34"/><path d="M28 10 v26 a8 8 0 1 0 8 0 V10 a4 4 0 0 0 -8 0 Z"/><circle cx="32" cy="46" r="4" fill="#e0301e"/></g><path d="M46 24 C40 32 42 38 47 40 C44 34 48 32 48 28 C52 32 52 40 46 46 C56 44 58 30 46 24 Z" fill="#f3a6a0" opacity=".85"/></svg>`,
  cold:`<svg viewBox="0 0 64 64"><g stroke="#2f5fd0" stroke-width="3" fill="none" stroke-linecap="round"><line x1="4" y1="18" x2="16" y2="18"/><line x1="4" y1="26" x2="16" y2="26"/><line x1="4" y1="34" x2="14" y2="34"/><path d="M28 10 v26 a8 8 0 1 0 8 0 V10 a4 4 0 0 0 -8 0 Z"/><circle cx="32" cy="46" r="4" fill="#2f5fd0"/></g><g stroke="#2f5fd0" stroke-width="2.5" stroke-linecap="round"><line x1="46" y1="18" x2="46" y2="38"/><line x1="38" y1="28" x2="54" y2="28"/><line x1="40" y1="21" x2="52" y2="35"/><line x1="52" y1="21" x2="40" y2="35"/></g></svg>`,
  new:`<svg viewBox="0 0 64 64"><path fill="none" stroke="#16202b" stroke-width="3" stroke-linejoin="round" d="M32 3 L37 11 L46 6 L46 16 L56 17 L51 26 L59 32 L51 38 L56 47 L46 48 L46 58 L37 53 L32 61 L27 53 L18 58 L18 48 L8 47 L13 38 L5 32 L13 26 L8 17 L18 16 L18 6 L27 11 Z"/><text x="32" y="37" text-anchor="middle" font-family="IBM Plex Mono,monospace" font-weight="700" font-size="13" fill="#16202b">NEW</text></svg>`,
  used:`<svg viewBox="0 0 64 64"><g fill="#16202b"><path d="M8 22 h34 v-8 l16 12 -16 12 v-8 h-34 z"/><path d="M56 42 h-34 v8 l-16 -12 16 -12 v8 h34 z"/></g></svg>`,
  km:`<svg viewBox="0 0 64 64"><g fill="#16202b"><path d="M14 6 a9 9 0 0 1 9 9 c0 7 -9 17 -9 17 s-9 -10 -9 -17 a9 9 0 0 1 9 -9 z"/><circle cx="14" cy="15" r="4" fill="#fff"/><path d="M50 6 a9 9 0 0 1 9 9 c0 7 -9 17 -9 17 s-9 -10 -9 -17 a9 9 0 0 1 9 -9 z"/><circle cx="50" cy="15" r="4" fill="#fff"/></g><line x1="6" y1="50" x2="58" y2="50" stroke="#16202b" stroke-width="3"/><text x="32" y="46" text-anchor="middle" font-family="IBM Plex Mono,monospace" font-weight="700" font-size="14" fill="#16202b">KM</text></svg>`,
  cycle:`<svg viewBox="0 0 64 64"><g stroke="#e0301e" stroke-width="3" fill="none" stroke-linecap="round"><path d="M12 22 a20 20 0 0 1 34 -8"/><polygon points="46,6 46,16 56,11" fill="#e0301e" stroke="none"/><path d="M52 42 a20 20 0 0 1 -34 8"/><polygon points="18,58 18,48 8,53" fill="#e0301e" stroke="none"/><path d="M24 26 q4 -6 8 0 q4 6 8 0" stroke-width="2.5"/></g></svg>`,
  wet:`<svg viewBox="0 0 64 64"><circle cx="32" cy="32" r="28" fill="none" stroke="#16202b" stroke-width="3"/><path d="M20 26 a8 8 0 0 1 6 -13 a10 10 0 0 1 19 3 a7 7 0 0 1 -2 14 h-21 a6 6 0 0 1 -2 -4 z" fill="#16202b"/><g stroke="#16202b" stroke-width="2.5" stroke-linecap="round"><line x1="22" y1="38" x2="19" y2="46"/><line x1="32" y1="38" x2="29" y2="46"/><line x1="42" y1="38" x2="39" y2="46"/></g></svg>`,
  dry:`<svg viewBox="0 0 64 64"><circle cx="32" cy="32" r="28" fill="none" stroke="#16202b" stroke-width="3"/><circle cx="32" cy="32" r="10" fill="none" stroke="#16202b" stroke-width="3"/><g stroke="#16202b" stroke-width="3" stroke-linecap="round"><line x1="32" y1="10" x2="32" y2="16"/><line x1="32" y1="48" x2="32" y2="54"/><line x1="10" y1="32" x2="16" y2="32"/><line x1="48" y1="32" x2="54" y2="32"/><line x1="16" y1="16" x2="20" y2="20"/><line x1="44" y1="44" x2="48" y2="48"/><line x1="48" y1="16" x2="44" y2="20"/><line x1="20" y1="44" x2="16" y2="48"/></g></svg>`
};

/* ---- one tyre band (5x3 grid). t = {pos,cond,wear,temp,id,km,cycle} where
   pos in vl/vr/hl/hr, cond in dry/wet, wear in new/used, temp in cold/hot.
   The named cells get the green highlight to show the tyre's state. ---- */
function bandEl(t){
  t=t||{};
  const b=document.createElement('div');b.className='band';
  const grid=[
    ['vl','VL','txt'],['vr','VR','txt'],['hl','HL','txt'],['hr','HR','txt'],[null,t.id||'----','id'],
    ['dry','DRY','icon'],['new','NEW','icon'],['cold','COLD','icon'],['km','KM','icon'],[null,(t.km!=null?t.km:'—'),'num'],
    ['wet','WET','icon'],['used','USED','icon'],['hot','HOT','icon'],['cycle','CYCLE','icon'],[null,(t.cycle!=null?t.cycle:'—'),'num']
  ];
  const active=new Set([t.pos,t.cond,t.wear,t.temp].filter(Boolean));
  grid.forEach(([key,label,type])=>{
    const c=document.createElement('div');c.className='cell'+((key&&active.has(key))?' hl':'');
    if(type==='icon')c.innerHTML=ICONS[key]+'<div class="lbl">'+label+'</div>';
    else if(type==='id')c.innerHTML='<div class="idtxt">'+label+'</div>';
    else if(type==='num')c.innerHTML='<div class="numtxt">'+label+'</div>';
    else c.innerHTML='<div class="txt">'+label+'</div>';
    b.appendChild(c);
  });
  return b;
}

/* ---- a set = label + 4 bands stacked vertically (VL,VR,HL,HR) ---- */
function setEl(s,kind){
  const col=document.createElement('div');col.className='set '+kind+(s.placeholder?' placeholder':'');
  const h=document.createElement('div');h.className='setlbl';h.textContent=s.label;col.appendChild(h);
  s.tyres.forEach(t=>{
    if(s.placeholder){const b=document.createElement('div');b.className='band placeholder';col.appendChild(b);}
    // rule: STINT tyres are always COLD — force hot -> cold for stint bands
    // (a set transferred from TRACK cools down once it's a stint set).
    else col.appendChild(bandEl(kind==='stint'&&t&&t.temp==='hot'?Object.assign({},t,{temp:'cold'}):t));
  });
  return col;
}
function emptySet(label){return {label,placeholder:true,tyres:[0,0,0,0]};}

/* build a full 4-tyre set from shorthand: each set gets the four positions,
   sharing the set id + condition, with per-position km/cycle. */
function makeSet(label,id,cond,wear,temp,km,cycle){
  const pos=['vl','vr','hl','hr'];
  return {label,tyres:pos.map((p,i)=>({pos:p,cond,wear,temp,id,km:km+i,cycle}))};
}

/* ---- STINT: up to 5 used sets, newest (last stint) first ---- */
const STINT_SETS=[
  makeSet('Stint 1 · 0001','0001','dry','used','cold', 305, 3),
  emptySet('Stint 2 · 0002'),
  emptySet('Stint 3 · 0003'),
  emptySet('Stint 4 · 0004'),
  emptySet('Stint 5 · 0005')
];

/* ---- STOCK: fresh/available sets ---- */
const STOCK_SETS=[
  makeSet('Set A · 0011','0011','dry','new','cold',0,0),
  makeSet('Set B · 0012','0012','dry','new','cold',0,0),
  makeSet('Set C · 0013','0013','wet','new','cold',0,0),
  makeSet('Set D · 0014','0014','dry','new','cold',0,0),
  makeSet('Set E · 0015','0015','wet','new','cold',0,0)
];

/* ---- current tyres on the car (TRACK cluster) ---- */
const TRACK_TYRES=[
  {pos:'vl',cond:'dry',wear:'new',temp:'cold',id:'0006',km:1235,cycle:12}, // front-left
  {pos:'vr',cond:'dry',wear:'new',temp:'cold',id:'0006',km:1235,cycle:12}, // front-right
  {pos:'hl',cond:'dry',wear:'new',temp:'cold',id:'0006',km:1235,cycle:12}, // rear-left
  {pos:'hr',cond:'dry',wear:'new',temp:'cold',id:'0006',km:1235,cycle:12}  // rear-right
];

/* place the four TRACK bands around the car: FL top-left, FR top-right,
   RL bottom-left, RR bottom-right (grid cells around the centred car). */
(function buildTrack(){
  const track=document.getElementById('track');
  const spots=[
    {t:TRACK_TYRES[0],col:1,row:1},{t:TRACK_TYRES[1],col:3,row:1},
    {t:TRACK_TYRES[2],col:1,row:2},{t:TRACK_TYRES[3],col:3,row:2}
  ];
  spots.forEach(s=>{const b=bandEl(s.t);b.style.gridColumn=s.col;b.style.gridRow=s.row;track.appendChild(b);});
})();

/* fill the two reels */
STINT_SETS.forEach(s=>document.getElementById('stintReel').appendChild(setEl(s,'stint')));
STOCK_SETS.forEach(s=>document.getElementById('stockReel').appendChild(setEl(s,'stock')));

/* ---- button toggles: click STINT / STOCK to open (or close) its reel ---- */
function wireToggle(btnId,secId){
  const btn=document.getElementById(btnId),sec=document.getElementById(secId);
  btn.addEventListener('click',()=>{const open=sec.classList.toggle('open');btn.classList.toggle('on',open);
    if(open)sec.scrollIntoView({behavior:'smooth',block:'nearest'});});
}
wireToggle('stintBtn','stintSec');
wireToggle('stockBtn','stockSec');

/* ---- reel nav arrows: page the horizontal scroll by ~one set width ---- */
document.querySelectorAll('.navbtn').forEach(b=>{
  b.addEventListener('click',()=>{const reel=document.getElementById(b.dataset.scroll);if(!reel)return;
    const first=reel.querySelector('.set');const step=first?(first.getBoundingClientRect().width+16):220;
    reel.scrollBy({left:step*(+b.dataset.dir),behavior:'smooth'});});
});
</script>
</body>
</html>
