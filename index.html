<!DOCTYPE html>
<html lang="nl"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STINT9 Add-on</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#f4f5f7;--card:#fff;--border:#e3e6ea;--ink:#16202b;--muted:#6b7480;--accent:#e0301e}
  body{font-family:'Space Grotesk',system-ui,sans-serif;background:var(--bg);color:var(--ink)}
  .wrap{width:1280px;box-sizing:border-box;margin:0;padding:10px 26px 28px}
  .metabar{display:flex;align-items:center;gap:12px;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--muted);border-bottom:1px solid var(--border);padding-bottom:14px;margin-bottom:20px}
  .pill{border:1px solid var(--border);border-radius:6px;padding:4px 10px;letter-spacing:1px;color:var(--ink);background:var(--card)}
  .metabar .right{margin-left:auto;font-weight:600;color:var(--ink)}.metabar .right b{color:var(--accent)}
  .eyebrow{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
  h1{font-weight:700;font-size:clamp(28px,4vw,44px);letter-spacing:-1px;line-height:1}h1 b{color:var(--accent)}
  .subline{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--ink);margin-top:10px}
  a.link{color:var(--muted);text-decoration:none;font-family:'IBM Plex Mono',monospace;font-size:12px}a.link:hover{color:var(--accent)}
  .toolrow{display:flex;align-items:flex-end;gap:16px;flex-wrap:wrap;margin:20px 0 0}
  .headrow{display:flex;align-items:flex-start;justify-content:flex-start;gap:24px;flex-wrap:wrap;margin-top:4px}
  .evdate{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1px;color:var(--muted);margin-top:2px}
  .field{display:flex;flex-direction:column-reverse;gap:5px}
  .field label{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
  select,input[type=number]{font-family:'IBM Plex Mono',monospace;font-size:14px;color:var(--ink);background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 12px;box-sizing:border-box;height:44px;line-height:1.2}
  select{cursor:pointer}input[type=number]{width:64px}
  select:focus,input:focus{outline:none;border-color:var(--accent)}
  .split{display:flex;gap:22px;align-items:flex-start;margin-top:9px}
  .left{flex:0 0 46%;max-width:46%}.right{flex:1 1 auto;min-width:0}
  .colhead{font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);height:22px;margin-bottom:8px;white-space:nowrap;overflow:hidden}
  .card{background:var(--card);border:1px solid var(--border);border-radius:14px}
  .stage{position:relative;overflow:hidden}#svg{display:block;width:64%;height:auto;margin:0 auto}
  .carbadge{position:absolute;pointer-events:none;display:none;flex-direction:column;align-items:center;white-space:nowrap;transform:translate(-50%,-50%)}
  .carbadge .row{display:flex;align-items:center;gap:10px}
  .carbadge .num{font-weight:700;font-size:29px;letter-spacing:-1px;color:var(--ink);line-height:1}
  .carbadge.sel .num{color:var(--ink)}
  .carbadge .pos{font-weight:600;font-size:19px;color:var(--ink)}
  .carbadge .lap{font-weight:600;font-size:19px;color:var(--ink)}
  .carbadge .gaps{display:inline-flex;flex-direction:column;justify-content:center;height:29px;line-height:1;font-family:'IBM Plex Mono',monospace;font-weight:600}
  .carbadge .ga{font-size:14px;color:#c0392b}.carbadge .gb{font-size:14px;color:#1e8f3a}
  .carbadge .drv{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1px;color:var(--muted);margin-top:4px}
    .controls{display:flex;flex-direction:row;align-items:center;gap:7px;padding:8px 10px;margin-left:auto}
  .controls select{font-size:12px;height:32px;padding:4px 8px}
  .controls input[type=range]{flex:1 1 90px;min-width:70px}.controls .btn{width:auto}.controls select{width:auto;min-width:0}.controls .clock{margin-right:2px}
  .clock{font-weight:700;font-size:16px;color:var(--ink);min-width:0;line-height:1}
  .clock small{display:block;font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;font-weight:500}
  input[type=range]{flex:1;min-width:150px;accent-color:var(--accent)}
  .btn{font-family:'IBM Plex Mono',monospace;background:var(--ink);border:1px solid var(--ink);color:#fff;font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:6px 10px;border-radius:7px;cursor:pointer}
  .btn:hover{background:var(--accent);border-color:var(--accent)}
  .oncount{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--muted)}
  label.chk{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--muted);display:flex;gap:6px;align-items:center;cursor:pointer}
  .chartbox{padding:2px 8px}.chartbox svg{display:block;width:100%;height:auto}
  .reelbtn{background:#8a929b;color:#fff;border:none;border-radius:9px;width:32px;height:46px;font-size:14px;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.18);display:flex;align-items:center;justify-content:center;padding:0;line-height:1}
  .reelbtn:hover:not(:disabled){background:#6b7480}
  .reelbtn:disabled{opacity:.3;cursor:default;box-shadow:none}
  #reelview .reelpanel{flex:0 0 100%;min-height:0;display:flex;align-items:center;justify-content:center;overflow:hidden}
  #reelview .reelpanel svg{display:block;width:100%;height:100%}
  .reelthumb{position:relative;flex:1 1 0;min-height:0;border:2px solid #cdd2d8;background:#f7f8fa;border-radius:7px;overflow:hidden;cursor:pointer}
  .reelthumb.active{border-color:#6b7480;box-shadow:0 0 0 2px rgba(107,116,128,.3)}
  #reelfilm svg{position:absolute;inset:0;width:100%;height:100%;display:block}
  .thumbcap{position:absolute;top:2px;left:3px;z-index:2;font:700 8px 'IBM Plex Mono',monospace;color:#6b7480;background:rgba(255,255,255,.75);padding:0 3px;border-radius:3px;letter-spacing:.4px}
  .fuelpanel{width:100%;height:100%;overflow-y:auto;padding:4px 9px;box-sizing:border-box;font-family:'IBM Plex Mono',monospace;color:#16202b}
  .fuelhd{font-weight:700;font-size:12px;color:#6b7480;margin-bottom:3px}
  .fuelset{display:flex;flex-wrap:wrap;gap:3px 10px;font-size:10.5px;align-items:center;margin-bottom:4px}
  .fuelset label{display:flex;align-items:center;gap:3px;color:#6b7480}
  .fuelset input{width:44px;font-family:inherit;font-size:10.5px;padding:1px 3px;border:1px solid #cfd4da;border-radius:4px;color:#16202b}
  .fbtn,.ftgl{font-family:inherit;font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;border:1px solid #cfd4da;cursor:pointer}
  .fbtn{background:#16202b;color:#fff;border-color:#16202b}
  .ftgl{background:#eef0f3;color:#6b7480}
  .fuelreadout{display:grid;grid-template-columns:1fr 1fr;gap:2px 14px;margin:4px 0;padding:5px 8px;background:#f7f8fa;border:1px solid #eceef1;border-radius:7px}
  .fro{display:flex;justify-content:space-between;font-size:11.5px;gap:8px}
  .frl{color:#8a929b}.frv{font-weight:700}
  .fnotify{background:#fff3e0;border:1px solid #e8871e;color:#b5651a;font-weight:700;font-size:11.5px;padding:3px 8px;border-radius:6px;margin:3px 0;text-align:center}
  .fuellog{font-size:10.5px;padding-bottom:4px}
  .flogrow{display:flex;align-items:center;gap:6px;padding:1.5px 2px;border-top:1px solid #eef0f3}
  .flogrow.pit{background:#eef4ff}
  .flogrow input{width:46px;font-family:inherit;font-size:10.5px;padding:1px 3px;border:1px solid #cfd4da;border-radius:4px}
  .floglbl{color:#6b7480;min-width:92px}
  .agentbar{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-top:10px;padding:8px 12px;background:#fff;border:1px solid #e6e8ec;border-radius:14px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
  .agentbar .agicon{font-size:18px;line-height:1}
  #agentq{flex:1 1 auto;min-width:200px;font-family:'IBM Plex Mono',monospace;font-size:14px;padding:8px 12px;border:1px solid #cfd4da;border-radius:9px;color:#16202b;outline:none}
  #agentq:focus{border-color:#16202b}
  #agentq::placeholder{color:#9aa1a9}
  .agentgo{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:14px;padding:8px 18px;border-radius:9px;border:none;background:#16202b;color:#fff;cursor:pointer}
  .agentgo:hover{background:#2a3646}
  .agenta{flex:1 1 100%;font-family:'IBM Plex Mono',monospace;font-size:13.5px;color:#16202b;line-height:1.55;padding:3px 2px 0;white-space:pre-wrap;display:none}
  .agenta.show{display:block}
  .agenta b{color:#e0301e}
  .agentsug{flex:1 1 100%;display:flex;flex-wrap:wrap;gap:6px;align-items:center}
  .agentsug>span{font-family:'IBM Plex Mono',monospace;font-size:12px;color:#9aa1a9}
  .sug{font-family:'IBM Plex Mono',monospace;font-size:12px;color:#3a4656;background:#f1f3f5;border:1px solid #e2e5ea;border-radius:20px;padding:3px 11px;cursor:pointer}
  .sug:hover{background:#e7eaee;border-color:#cfd4da}
  [data-focus]{position:relative}
  .zoombtn{position:absolute;top:6px;left:6px;z-index:7;width:30px;height:30px;border-radius:8px;border:1px solid #d3d7dc;background:rgba(255,255,255,.92);color:#16202b;font-size:15px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;box-shadow:0 1px 3px rgba(0,0,0,.12)}
  .zoombtn:hover{background:#fff}
  #focusLayer{position:fixed;inset:0;background:rgba(18,24,34,.55);z-index:10000;display:none;align-items:center;justify-content:center;padding:2vmin;box-sizing:border-box}
  #focusLayer.on{display:flex}
  #focusHost{background:#fff;border-radius:16px;box-shadow:0 12px 48px rgba(0,0,0,.4);max-width:97vw;max-height:95vh;overflow:auto;padding:10px;box-sizing:border-box}
  .card.zoomed{width:min(96vw,1400px)!important;max-width:none!important;flex:none!important;margin:0!important}
  .card.zoomed #svg,.card.zoomed #mini{width:96%!important}
  .card.zoomed #gapgauge{display:none}
  .cl{fill:none;stroke-linejoin:round;stroke-linecap:round}
  .axis{fill:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:12px}
  .paxis{fill:var(--ink);font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:600}
  .glin{stroke:var(--border);stroke-width:1}
  .tip{font-family:'Space Grotesk';font-size:16px;font-weight:600}
  .rlbl{font-family:'Space Grotesk';font-size:16px;font-weight:600;fill:var(--ink)}
  .drvpanel{margin-top:13px}
  table.stints{width:100%;border-collapse:collapse;font-size:6.5px}
  table.stints th{text-align:left;font-family:'IBM Plex Mono',monospace;font-size:5px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);padding:4px 6px;border-bottom:1px solid var(--accent)}
  table.stints td{padding:4.5px 6px;border-bottom:1px solid var(--border)}
  table.stints .g{color:#1e8f3a;font-weight:600}table.stints .d{color:#c0392b;font-weight:600}
  table.stints.cmp{font-size:10px}table.stints.cmp th,table.stints.cmp td{padding:4px 4px;white-space:nowrap}
  .footer{margin-top:40px;padding-top:16px;border-top:1px solid var(--border);display:flex;justify-content:space-between;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:#aab0b8}
</style></head>
<body><div class="wrap">
  <div class="headrow">
    <div style="display:flex;flex-direction:column"><h1 style="margin:0">stint<b>9</b></h1><div class="evdate">2025 · NLS 6</div></div>
    <div class="toolrow" style="margin:0">
      <div class="field"><label for="classsel">Race class</label><select id="classsel"><option value="CUP5">CUP5 · BMW M235i</option></select></div>
      <div class="field"><label for="carsel">Select car</label><select id="carsel"><option value="">— select a car —</option></select></div>
      <div class="field"><label for="delaythr">Delay %</label><input type="number" id="delaythr" value="50" min="0" step="5"></div>
      <div class="field"><label for="pacethr">Pace &#916; s</label><input type="number" id="pacethr" value="0.2" min="0" step="0.05"></div>
    </div>
    <div class="card controls" id="controls">
      <div class="clock"><span id="clock"></span></div>
      <button class="btn" id="play">&#9654; Play</button>
      <input type="range" id="scrub" step="0.1">
      <select id="speed"><option value="1">1&times;</option><option value="10">10&times;</option><option value="30">30&times;</option><option value="60" selected>60&times;</option></select>
      <input type="checkbox" id="lbls" checked style="display:none">
    </div>
  </div>
  <div style="display:flex;flex-wrap:nowrap;gap:16px;align-items:stretch;margin-top:6px">
    <div class="card cmpwrap" id="cmpbox" style="flex:1 1 56%;min-width:0;padding:4px 6px;display:none">
      <table class="stints cmp"><thead><tr><th>Pos</th><th>Driver</th><th>Gap</th><th>Fastest</th><th>Last lap</th><th>S1</th><th>S2</th><th>S3</th><th>S4</th><th>S5</th></tr></thead><tbody id="cmpbody"></tbody></table>
    </div>
    <div class="card" id="gapbox" style="flex:1 1 44%;min-width:0;padding:6px 12px;display:none">
      <div class="colhead" style="margin:0 0 2px">Cumulative gap to <span id="gaphd"></span></div>
      <svg id="gapchart" viewBox="0 0 1000 140" style="display:block;width:100%;height:auto"></svg>
    </div>
  </div>
  <div class="split" style="margin-top:13px">
    <div class="left">
      <div class="card stage" data-focus><svg id="svg" viewBox="80 80 1340 1300"><g id="track"></g><g id="dots"></g><g id="predsvg"></g></svg><div class="carbadge" id="carbadge"></div></div>
    </div>
    <div class="right">
      <div class="card stage" data-focus style="background:#fbfbfc"><svg id="mini" viewBox="0 0 268 268" style="display:block;width:auto;height:auto;margin:0 auto;overflow:visible">
        <defs><clipPath id="miniclip"><circle cx="134" cy="134" r="134"/></clipPath></defs>
        <g clip-path="url(#miniclip)"><g id="miniG"></g></g>
        <circle cx="134" cy="134" r="133" fill="none" stroke="#d3d7dc" stroke-width="1.5"/>
        <text id="miniAhead" x="134" y="17" text-anchor="middle" font-family="IBM Plex Mono,monospace" font-size="18" font-weight="600" fill="#16202b"></text>
        <text id="miniBehind" x="134" y="260" text-anchor="middle" font-family="IBM Plex Mono,monospace" font-size="18" font-weight="600" fill="#16202b"></text>
        <g id="miniEv"></g>
        <text id="minihint" x="134" y="138" text-anchor="middle" font-family="IBM Plex Mono" font-size="11" fill="#9aa1a9">select a car</text>
      </svg><svg id="gapgauge" viewBox="0 0 120 460" preserveAspectRatio="xMidYMid meet" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);width:auto;height:auto"></svg></div>
    </div>
  </div>
  <div style="display:flex;flex-wrap:nowrap;gap:16px;align-items:flex-start;margin-top:13px">
    <div class="card chartbox" id="reelcard" data-focus style="flex:1 1 56%;min-width:0;display:flex;align-items:stretch;gap:6px">
      <div id="reelnav" style="flex:0 0 32px;display:flex;flex-direction:column;justify-content:center;gap:10px">
        <button class="reelbtn" id="reelup" title="Previous view">&#9650;</button>
        <button class="reelbtn" id="reeldn" title="Next view">&#9660;</button>
      </div>
      <div id="reelview" style="flex:1 1 auto;min-width:0;overflow:hidden;position:relative">
        <div id="reelstrip" style="display:flex;flex-direction:column;height:100%;will-change:transform;transition:transform .5s cubic-bezier(.55,.06,.2,1)">
          <div class="reelpanel"><svg id="lapchart"></svg></div>
          <div class="reelpanel"><svg id="ltgraph"></svg></div>
          <div class="reelpanel"><div id="fuelpanel" class="fuelpanel">
            <div class="fuelhd">FUEL OVERVIEW · <span id="fuelcar">#—</span></div>
            <div class="fuelset">
              <label>capacity <input id="fcap" type="number" step="1"> L</label>
              <label>consumption <input id="fcons" type="number" step="0.1"> L/lap</label>
              <label>formation <input id="fform" type="number" step="0.1"> laps</label>
              <label>before race <input id="fstart" type="number" step="0.5"> L</label>
              <button id="ffull" class="fbtn">FULL</button>
              <button id="ftoggle" class="ftgl">zero liter</button>
            </div>
            <div class="fuelreadout">
              <div class="fro"><span class="frl">in tank now</span><span id="ftank" class="frv">—</span></div>
              <div class="fro"><span class="frl">predicted fuel</span><span id="fpred" class="frv">—</span></div>
              <div class="fro"><span class="frl">laps remaining</span><span id="flaps" class="frv">— laps</span></div>
              <div class="fro"><span class="frl">max lap</span><span id="fmax" class="frv">L— F/S</span></div>
            </div>
            <div id="fnotify" class="fnotify" style="display:none">&#9981; request fuel update?</div>
            <div id="fuellog" class="fuellog"></div>
          </div></div>
          <div class="reelpanel"><svg id="sectorsvg"></svg></div>
          <div class="reelpanel"><svg id="flowsvg"></svg></div>
        </div>
      </div>
      <div id="reelfilm" style="flex:0 0 96px;display:flex;flex-direction:column;gap:8px;justify-content:center">
        <div class="reelthumb active" data-i="0" title="Lap chart — positions"><span class="thumbcap">POS</span><svg id="thumb0" preserveAspectRatio="xMidYMid meet"></svg></div>
        <div class="reelthumb" data-i="1" title="Lap-time trace"><span class="thumbcap">TIME</span><svg id="thumb1" preserveAspectRatio="xMidYMid meet"></svg></div>
        <div class="reelthumb" data-i="2" title="Fuel overview"><span class="thumbcap">FUEL</span><svg viewBox="0 0 100 72" preserveAspectRatio="xMidYMid meet"><rect x="26" y="16" width="30" height="42" rx="3" fill="none" stroke="#9aa1a9" stroke-width="4"/><rect x="30" y="34" width="22" height="20" fill="#c3c8ce"/><path d="M56 24 h8 a3 3 0 0 1 3 3 v22 a3 3 0 0 0 3 3" fill="none" stroke="#9aa1a9" stroke-width="4"/><line x1="30" y1="24" x2="52" y2="24" stroke="#9aa1a9" stroke-width="4"/></svg></div>
        <div class="reelthumb" data-i="3" title="Sector performance"><span class="thumbcap">SECT</span><svg id="thumb3" preserveAspectRatio="xMidYMid meet"></svg></div>
        <div class="reelthumb" data-i="4" title="Track-position flow"><span class="thumbcap">FLOW</span><svg id="thumb4" preserveAspectRatio="xMidYMid meet"></svg></div>
      </div>
    </div>
    <div class="card" data-focus style="flex:1 1 44%;min-width:0;overflow:hidden;border-radius:14px"><div id="weather" style="height:340px;width:100%"></div></div>
  </div>
  <div class="agentbar">
    <span class="agicon">&#129302;</span>
    <input id="agentq" type="text" placeholder="ask agent a question" autocomplete="off" spellcheck="false">
    <button id="agentgo" class="agentgo">ask</button>
    <div class="agentsug"><span>Try:</span><button class="sug">What's the likely outcome for our car?</button><button class="sug">Who pitted early?</button><button class="sug">Which sector are we losing time?</button></div>
    <div id="agenta" class="agenta"></div>
  </div>
</div>
<script src="data.js"></script>
<script>
const SVGNS='http://www.w3.org/2000/svg';
const SECCOL=['#2ea02c','#17becf','#1f77b4','#7b2fbe','#d62728'];
let selCar='',thr=0.5,paceThr=0.2;
let reelIdx=0;const REELN=5;
let FUEL={cap:85,cons:10.5,start:85,form:1.2,cars:{}};
try{const f=JSON.parse(localStorage.getItem('stint9_fuel')||'null');if(f)FUEL=Object.assign(FUEL,f);}catch(e){}
if(!FUEL.cars)FUEL.cars={};
if(FUEL.cons===1.5)FUEL.cons=10.5;
function saveFuel(){try{localStorage.setItem('stint9_fuel',JSON.stringify(FUEL));}catch(e){}}
function applyReel(anim){const strip=document.getElementById('reelstrip'),up=document.getElementById('reelup'),dn=document.getElementById('reeldn');if(!strip)return;strip.style.transition=anim?'transform .5s cubic-bezier(.55,.06,.2,1)':'none';strip.style.transform='translateY(-'+(reelIdx*100)+'%)';if(up)up.disabled=reelIdx<=0;if(dn)dn.disabled=reelIdx>=REELN-1;document.querySelectorAll('.reelthumb').forEach(t=>t.classList.toggle('active',+t.dataset.i===reelIdx));}
function setReel(i){i=Math.max(0,Math.min(REELN-1,i));if(i===reelIdx)return;reelIdx=i;applyReel(true);if(typeof savePrefs==='function')savePrefs();}
function syncReel(){const v=document.getElementById('reelview');if(!v)return;const w=v.clientWidth;if(w<10)return;v.style.height=(w*CH/1000).toFixed(1)+'px';applyReel(false);}

/* track */

  const cb=curBidx(selCar,T);if(cb==null)return;
  const acts=miniEvents.filter(e=>cb-e.bidx>=0&&cb-e.bidx<=2);let yy=228-(acts.length-1)*22;
  acts.forEach(e=>{const label=e.type+' #'+e.car+' S'+e.sector,w=label.length*6.6+16;
    const r=document.createElementNS(SVGNS,'rect');r.setAttribute('x',(134-w/2).toFixed(1));r.setAttribute('y',yy);r.setAttribute('width',w.toFixed(1));r.setAttribute('height','18');r.setAttribute('rx','5');r.setAttribute('fill',e.type==='GAIN'?'#1e8f3a':'#c0392b');mEv.appendChild(r);
    const t=document.createElementNS(SVGNS,'text');t.setAttribute('x','134');t.setAttribute('y',(yy+13).toString());t.setAttribute('text-anchor','middle');t.setAttribute('font-family','IBM Plex Mono,monospace');t.setAttribute('font-size','11');t.setAttribute('font-weight','700');t.setAttribute('fill','#fff');t.textContent=label;mEv.appendChild(t);yy+=22;});}
function setNb(el,nb,arrow,pos){while(el.firstChild)el.removeChild(el.firstChild);if(!nb)return;
  let dl=null,sec=null;const bi=lastCommon(selCar,nb,T);
  if(bi!=null){const lap=Math.floor((bi-1)/5)+1,k=((bi-1)%5)+1,ts=(DB.sectimes[selCar][lap]||[])[k-1],tn=(DB.sectimes[nb][lap]||[])[k-1];if(ts!=null&&tn!=null){dl=ts-tn;sec=k;}}
  const t1=document.createElementNS(SVGNS,'tspan');t1.textContent=arrow+' #'+nb+(pos?' P'+pos:'')+' '+(DB.name[nb]||'')+(dl!=null?'   ':'');el.appendChild(t1);
  if(dl!=null){const t2=document.createElementNS(SVGNS,'tspan');t2.setAttribute('fill',dl<0?'#1e8f3a':'#c0392b');t2.setAttribute('font-weight','700');t2.textContent='S'+sec+' Δ'+(dl>=0?'+':'')+dl.toFixed(1)+'s';el.appendChild(t2);}}
function renderGauge(T){const svg=document.getElementById('gapgauge');if(!svg)return;
  const W=120,H=470,cx=W/2,carW=58,carH=122,plotT=38,plotB=H-38;
  const T2=(x,y,anc,txt,col,fs,w)=>'<text x="'+x+'" y="'+(+y).toFixed(1)+'" text-anchor="'+anc+'" font-size="'+fs+'" '+(w?'font-weight="700" ':'')+'fill="'+col+'" font-family="IBM Plex Mono,monospace">'+txt+'</text>';
  if(!selCar){svg.innerHTML=T2(cx,H/2,'middle','—','#c9ced4',14);return;}
  const lp=livePos(T),p=lp[selCar],byPos={};for(const st in lp)byPos[lp[st]]=st;
  if(!p){svg.innerHTML=T2(cx,H/2,'middle','pit','#b5bcc4',13);return;}
  const ah=byPos[p-1];
  let dA=ah?commonGap(selCar,ah,T):null;dA=(dA!=null)?Math.max(0,dA):null;
  const carImg=(top,label,col)=>{const ty=top+carH/2,g='<g transform="translate('+cx.toFixed(1)+' '+ty.toFixed(1)+') rotate(-90)"><image href="topview.png" x="'+(-carH/2).toFixed(1)+'" y="'+(-carW/2).toFixed(1)+'" width="'+carH+'" height="'+carW+'" style="mix-blend-mode:multiply"/></g>';
    return g+(label?T2(cx,top+carH+16,'middle',label,col,12,1):'');};
  const selfTop=plotB-carH;
  if(dA==null){svg.innerHTML=T2(cx,plotT-6,'middle','LEADER','#16202b',11,1)+carImg(selfTop,'#'+selCar,'#e0301e');return;}
  const usable=plotB-plotT-carH*2,scale=usable/Math.max(dA,2),aheadTop=Math.max(plotT,selfTop-carH-dA*scale);
  const majStep=dA>26?5:dA>13?2:1;
  let s='';
  for(let sc=0;sc<=dA+1e-6;sc+=1){const y=plotT+sc*scale;if(y>plotB+0.5)break;const maj=sc%majStep===0;s+='<line x1="6" x2="'+(W-6)+'" y1="'+y.toFixed(1)+'" y2="'+y.toFixed(1)+'" stroke="'+(maj?'#dde1e6':'#f0f1f4')+'" stroke-width="1"/>'+(maj?T2(8,y-2.5,'start',sc+'s','#b8bec6',9):'');}
  s+=carImg(aheadTop,'#'+ah,'#16202b');
  s+=carImg(selfTop,'#'+selCar,'#e0301e');
  s+=T2(W-5,(aheadTop+carH+selfTop)/2+3,'end',dA.toFixed(1)+'s','#c0392b',12,1);
  s+=T2(cx,14,'middle','▲ '+('#'+ah+' P'+(p-1)),'#16202b',11,1);
  svg.innerHTML=s;}
function renderMini(T,lp){const hint=document.getElementById('minihint');
  if(!selCar){for(const st in MEL)MEL[st].g.style.visibility='hidden';hint.style.display='';setNb(mAhead,null);setNb(mBehind,null);setEv(T);return;}
  hint.style.display='none';const sc=carXY(selCar,T);
  if(!sc){for(const st in MEL)MEL[st].g.style.visibility='hidden';setNb(mAhead,null);setNb(mBehind,null);setEv(T);return;}
  miniG.setAttribute('transform','translate('+(134-sc[0]).toFixed(1)+','+(134-sc[1]).toFixed(1)+')');
  const R=134,placedM=[],shown=new Set();
  for(const st in MEL)MEL[st].g.style.visibility='hidden';
  const vis=DB.cars.map(st=>[st,carXY(st,T)]).filter(a=>a[1]&&Math.hypot(a[1][0]-sc[0],a[1][1]-sc[1])<R+30).sort((a,b)=>(lp[a[0]]||99)-(lp[b[0]]||99));
  const dots=vis.map(([st,xy])=>{const pos=lp[st]||16,r=Math.max(4,11*Math.pow(0.95,pos-1)),selq=(st===selCar),E=MEL[st];
    E.g.setAttribute('transform','translate('+xy[0].toFixed(1)+','+xy[1].toFixed(1)+')');E.g.style.visibility='visible';shown.add(st);
    const R2=selq?r*1.5:r;E.c.setAttribute('r',R2);E.c.setAttribute('stroke',selq?'#e0301e':'#111');E.c.setAttribute('stroke-width',selq?'2':'1');E.c.setAttribute('fill-opacity',selq?'0.5':'1');
    E.c.setAttribute('fill',pos===1?'#F9A800':pos===2?'#C0C0C0':pos===3?'#7E4B26':DB.carcol[st]);
    E.p.textContent=pos<=3?('P'+pos):'';if(pos<=3){E.p.setAttribute('font-size',(R2*0.82).toFixed(1));E.p.setAttribute('y',(R2*0.3).toFixed(1));E.p.setAttribute('fill','#fff');E.p.setAttribute('stroke','#1a1a1a');E.p.setAttribute('stroke-width','0.6');E.p.setAttribute('paint-order','stroke');}
    return {st,x:xy[0],y:xy[1],r:R2,E,selq};});
  dots.slice().sort((a,b)=>(lp[b.st]||99)-(lp[a.st]||99)).forEach(d=>miniG.appendChild(d.E.g));
  const fs=6.2;
  dots.forEach(dt=>{const E=dt.E;E.t.setAttribute('font-size',fs);E.t.setAttribute('fill',dt.selq?'#e0301e':'#16202b');
    const lw=('#'+dt.st).length*fs*0.62,lh=fs,half=Math.max(lw,lh)/2,gap=3;
    const base=Math.atan2(DB.cy-dt.y,DB.cx-dt.x);
    const dirs=[0,25,-25,50,-50,80,-80].map(a=>{const t=base+a*Math.PI/180;return [Math.cos(t),Math.sin(t)];});
    let best=null,bestPen=Infinity;
    for(const rr of [0,8,18,30]){for(const d of dirs){
      const dist=dt.r+gap+half+rr,dx=d[0]*dist,dy=d[1]*dist,cx=dt.x+dx,cy=dt.y+dy;
      let pen=0;
      for(const o of dots){if(o===dt)continue;const ox=(lw/2+o.r)-Math.abs(cx-o.x),oy=(lh/2+o.r)-Math.abs(cy-o.y);if(ox>0&&oy>0)pen+=ox*oy;}
      for(const q of placedM){const ox=(lw/2+q.w/2)-Math.abs(cx-q.x),oy=lh-Math.abs(cy-q.y);if(ox>0&&oy>0)pen+=ox*oy;}
      if(pen<bestPen){bestPen=pen;best=[dx,dy,cx,cy];}
      if(pen===0)break;
    } if(bestPen===0)break;}
    E.t.setAttribute('text-anchor','middle');E.t.setAttribute('x',best[0].toFixed(1));E.t.setAttribute('y',(best[1]+lh*0.35).toFixed(1));
    placedM.push({x:best[2],y:best[3],w:lw});});
  for(const st in MEL)if(!shown.has(st))MEL[st].g.style.visibility='hidden';
  const p=lp[selCar];let ah=null,be=null;for(const st in lp){if(lp[st]===p-1)ah=st;if(lp[st]===p+1)be=st;}
  setNb(mAhead,ah,'▲',p-1);setNb(mBehind,be,'▼',p+1);setEv(T);}

  DB.cars.forEach(st=>{LEG[st]=(DB.legs[st]||[]).slice().sort((a,b)=>a[2]-b[2]);

    g.appendChild(c);g.appendChild(t);g.appendChild(dl);g.appendChild(p);gd.appendChild(g);EL[st]={g,c,t,dl,p};});

  for(const k in CLINE)delete CLINE[k];for(const k in CTIP)delete CTIP[k];for(const k in CRT)delete CRT[k];for(const k in CSEC)delete CSEC[k];for(const k in CPIT)delete CPIT[k];
  for(let L=1;L<=maxN;L++){if(L!==1&&L%5!==0)continue;const ln=document.createElementNS(SVGNS,'line');ln.setAttribute('x1',X(L));ln.setAttribute('x2',X(L));ln.setAttribute('y1',yT-5);ln.setAttribute('y2',yT+nC*rowH);ln.setAttribute('class','glin');lc.appendChild(ln);

  for(let pp=1;pp<=nC;pp++){const t=document.createElementNS(SVGNS,'text');t.setAttribute('x',42);t.setAttribute('y',Y(pp)+5);t.setAttribute('text-anchor','end');t.setAttribute('class','paxis');t.textContent='P'+pp;lc.appendChild(t);}
  DB.cars.forEach(st=>{const pl=document.createElementNS(SVGNS,'polyline');pl.setAttribute('class','cl');pl.setAttribute('stroke',DB.carcol[st]);lc.appendChild(pl);CLINE[st]=pl;
    const tp=document.createElementNS(SVGNS,'text');tp.setAttribute('class','tip');tp.setAttribute('fill',DB.carcol[st]);tp.style.display='none';lc.appendChild(tp);CTIP[st]=tp;
